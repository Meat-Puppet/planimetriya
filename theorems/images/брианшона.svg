<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 460" width="100%" height="100%">
  <rect width="500" height="460" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="250" cy="230" r="110" fill="none" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Описанный шестиугольник -->
  <line x1="140" y1="120" x2="360" y2="120" stroke="#1E2321" stroke-width="2" />
  <line x1="360" y1="120" x2="390" y2="250" stroke="#1E2321" stroke-width="2" />
  <line x1="390" y1="250" x2="340" y2="360" stroke="#1E2321" stroke-width="2" />
  <line x1="340" y1="360" x2="160" y2="360" stroke="#1E2321" stroke-width="2" />
  <line x1="160" y1="360" x2="110" y2="250" stroke="#1E2321" stroke-width="2" />
  <line x1="110" y1="250" x2="140" y2="120" stroke="#1E2321" stroke-width="2" />

  <!-- Точки касания -->
  <circle cx="250" cy="120" r="3" fill="#7A9D8C" />
  <circle cx="380" cy="185" r="3" fill="#7A9D8C" />
  <circle cx="365" cy="310" r="3" fill="#7A9D8C" />
  <circle cx="250" cy="360" r="3" fill="#7A9D8C" />
  <circle cx="135" cy="310" r="3" fill="#7A9D8C" />
  <circle cx="125" cy="185" r="3" fill="#7A9D8C" />

  <!-- Вершины (обозначены буквами сторон) -->
  <text x="240" y="110" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">AB</text>
  <text x="375" y="115" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">BC</text>
  <text x="400" y="255" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">CD</text>
  <text x="340" y="380" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">DE</text>
  <text x="150" y="380" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">EF</text>
  <text x="90" y="255" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">FA</text>

  <!-- Главные диагонали -->
  <line x1="250" y1="120" x2="250" y2="360" stroke="#c2410c" stroke-width="2.5" />
  <line x1="360" y1="120" x2="160" y2="360" stroke="#2563eb" stroke-width="2.5" />
  <line x1="390" y1="250" x2="110" y2="250" stroke="#16a34a" stroke-width="2.5" />

  <!-- Точка Брианшона O -->
  <circle cx="250" cy="240" r="6" fill="#1E2321" />
  <text x="260" y="235" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E2321">O</text>

  <!-- Подписи диагоналей -->
  <text x="230" y="245" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#c2410c">AD</text>
  <text x="270" y="230" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#2563eb">BE</text>
  <text x="255" y="270" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#16a34a">CF</text>

  <!-- Формула -->
  <text x="250" y="450" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">AD ∩ BE ∩ CF = O (точка Брианшона)</text>
</svg>