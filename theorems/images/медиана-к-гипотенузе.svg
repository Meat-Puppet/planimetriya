<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Описанная окружность -->
  <circle cx="240" cy="250" r="140" fill="none" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Прямоугольный треугольник ABC -->
  <line x1="100" y1="340" x2="380" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="100" y1="340" x2="100" y2="160" stroke="#1E2321" stroke-width="2.5" />
  <line x1="100" y1="160" x2="380" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Медиана CM -->
  <line x1="100" y1="160" x2="240" y2="340" stroke="#c2410c" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="100" cy="340" r="5" fill="#7A9D8C" />
  <text x="75" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="380" cy="340" r="5" fill="#7A9D8C" />
  <text x="395" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="100" cy="160" r="5" fill="#7A9D8C" />
  <text x="75" y="150" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Середина M -->
  <circle cx="240" cy="340" r="5" fill="#c2410c" />
  <text x="250" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#c2410c">M</text>

  <!-- Центр O (он же M) -->
  <text x="250" y="200" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">O = M</text>

  <!-- Прямой угол при C -->
  <line x1="110" y1="330" x2="110" y2="170" stroke="#1E2321" stroke-width="1.5" />
  <line x1="100" y1="330" x2="110" y2="330" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отметки равных отрезков AM и MB -->
  <line x1="165" y1="332" x2="175" y2="342" stroke="#1E2321" stroke-width="1.5" />
  <line x1="305" y1="332" x2="315" y2="342" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отметки равных отрезков CM, AM, MB -->
  <line x1="160" y1="255" x2="170" y2="260" stroke="#c2410c" stroke-width="1.5" />

  <!-- Обозначения -->
  <text x="230" y="365" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>
  <text x="60" y="255" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  <text x="230" y="250" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">a</text>
  <text x="160" y="240" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">m_c</text>

  <!-- Формула -->
  <text x="240" y="410" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">m_c = c / 2 = R</text>
</svg>