<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="330" x2="420" y2="330" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="330" x2="250" y2="90" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="90" x2="420" y2="330" stroke="#1E2321" stroke-width="2.5" />

  <!-- Высота h -->
  <line x1="250" y1="90" x2="250" y2="330" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Вершины -->
  <circle cx="80" cy="330" r="5" fill="#7A9D8C" />
  <text x="55" y="360" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="250" cy="90" r="5" fill="#7A9D8C" />
  <text x="235" y="75" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="420" cy="330" r="5" fill="#7A9D8C" />
  <text x="435" y="360" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Основание высоты -->
  <circle cx="250" cy="330" r="4" fill="#c2410c" />
  <text x="255" y="360" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">H</text>

  <!-- Прямой угол -->
  <line x1="240" y1="320" x2="250" y2="320" stroke="#c2410c" stroke-width="1.5" />
  <line x1="250" y1="320" x2="250" y2="330" stroke="#c2410c" stroke-width="1.5" />

  <!-- Обозначения сторон -->
  <text x="240" y="355" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">a</text>
  <text x="340" y="220" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  <text x="140" y="220" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>

  <!-- Высота -->
  <text x="230" y="210" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">h</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">S = √(p(p − a)(p − b)(p − c))   •   p = (a + b + c)/2</text>
</svg>