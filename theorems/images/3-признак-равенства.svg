<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Первый треугольник ABC -->
  <line x1="60" y1="310" x2="160" y2="310" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="310" x2="60" y2="170" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="170" x2="160" y2="310" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины первого -->
  <circle cx="60" cy="310" r="4" fill="#7A9D8C" />
  <text x="35" y="335" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>
  <circle cx="160" cy="310" r="4" fill="#7A9D8C" />
  <text x="170" y="335" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>
  <circle cx="60" cy="170" r="4" fill="#7A9D8C" />
  <text x="35" y="165" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <!-- Отметки равных сторон -->
  <line x1="100" y1="305" x2="110" y2="315" stroke="#c2410c" stroke-width="1.5" />
  <line x1="55" y1="240" x2="65" y2="235" stroke="#2563eb" stroke-width="1.5" />
  <line x1="100" y1="240" x2="110" y2="245" stroke="#16a34a" stroke-width="1.5" />

  <!-- Второй треугольник A₁B₁C₁ -->
  <line x1="300" y1="310" x2="400" y2="310" stroke="#1E2321" stroke-width="2.5" />
  <line x1="300" y1="310" x2="300" y2="170" stroke="#1E2321" stroke-width="2.5" />
  <line x1="300" y1="170" x2="400" y2="310" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины второго -->
  <circle cx="300" cy="310" r="4" fill="#7A9D8C" />
  <text x="275" y="335" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A₁</text>
  <circle cx="400" cy="310" r="4" fill="#7A9D8C" />
  <text x="410" y="335" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B₁</text>
  <circle cx="300" cy="170" r="4" fill="#7A9D8C" />
  <text x="275" y="165" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C₁</text>

  <!-- Отметки равных сторон -->
  <line x1="340" y1="305" x2="350" y2="315" stroke="#c2410c" stroke-width="1.5" />
  <line x1="295" y1="240" x2="305" y2="235" stroke="#2563eb" stroke-width="1.5" />
  <line x1="340" y1="240" x2="350" y2="245" stroke="#16a34a" stroke-width="1.5" />

  <!-- Знак равенства -->
  <text x="235" y="250" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#1E2321" text-anchor="middle">=</text>

  <!-- Формула -->
  <text x="250" y="390" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">AB = A₁B₁    |    BC = B₁C₁    |    AC = A₁C₁    ⇒    ∆ABC = ∆A₁B₁C₁</text>
</svg>