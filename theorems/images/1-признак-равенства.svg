<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="100%" height="100%">
  <rect width="500" height="380" fill="#f5f7fa" rx="12" />

  <!-- Первый треугольник ABC -->
  <line x1="60" y1="300" x2="160" y2="300" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="300" x2="60" y2="160" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="160" x2="160" y2="300" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины первого -->
  <circle cx="60" cy="300" r="4" fill="#7A9D8C" />
  <text x="35" y="325" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>
  <circle cx="160" cy="300" r="4" fill="#7A9D8C" />
  <text x="170" y="325" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>
  <circle cx="60" cy="160" r="4" fill="#7A9D8C" />
  <text x="35" y="155" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <!-- Отметки равных сторон -->
  <line x1="100" y1="295" x2="110" y2="305" stroke="#c2410c" stroke-width="1.5" />
  <line x1="55" y1="230" x2="65" y2="225" stroke="#2563eb" stroke-width="1.5" />

  <!-- Угол A -->
  <path d="M 80 285 Q 90 275 85 265" fill="none" stroke="#16a34a" stroke-width="2" />
  <text x="85" y="268" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">A</text>

  <!-- Второй треугольник A₁B₁C₁ -->
  <line x1="300" y1="300" x2="400" y2="300" stroke="#1E2321" stroke-width="2.5" />
  <line x1="300" y1="300" x2="300" y2="160" stroke="#1E2321" stroke-width="2.5" />
  <line x1="300" y1="160" x2="400" y2="300" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины второго -->
  <circle cx="300" cy="300" r="4" fill="#7A9D8C" />
  <text x="275" y="325" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A₁</text>
  <circle cx="400" cy="300" r="4" fill="#7A9D8C" />
  <text x="410" y="325" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B₁</text>
  <circle cx="300" cy="160" r="4" fill="#7A9D8C" />
  <text x="275" y="155" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C₁</text>

  <!-- Отметки равных сторон -->
  <line x1="340" y1="295" x2="350" y2="305" stroke="#c2410c" stroke-width="1.5" />
  <line x1="295" y1="230" x2="305" y2="225" stroke="#2563eb" stroke-width="1.5" />

  <!-- Угол A₁ -->
  <path d="M 320 285 Q 330 275 325 265" fill="none" stroke="#16a34a" stroke-width="2" />
  <text x="325" y="268" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">A₁</text>

  <!-- Знак равенства -->
  <text x="235" y="240" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#1E2321" text-anchor="middle">=</text>

  <!-- Формула -->
  <text x="250" y="370" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">AB = A₁B₁    |    AC = A₁C₁    |    ∠A = ∠A₁    ⇒    ∆ABC = ∆A₁B₁C₁</text>
</svg>