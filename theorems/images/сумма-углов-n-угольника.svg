<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Шестиугольник -->
  <polygon points="250,60 400,140 400,280 250,360 100,280 100,140" fill="none" stroke="#1E2321" stroke-width="2.5" />

  <!-- Точка O внутри -->
  <circle cx="250" cy="210" r="4" fill="#c2410c" />
  <text x="235" y="205" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">O</text>

  <!-- Линии от O к вершинам -->
  <line x1="250" y1="210" x2="250" y2="60" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="250" y1="210" x2="400" y2="140" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="250" y1="210" x2="400" y2="280" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="250" y1="210" x2="250" y2="360" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="250" y1="210" x2="100" y2="280" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="250" y1="210" x2="100" y2="140" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />

  <!-- Вершины -->
  <circle cx="250" cy="60" r="4" fill="#7A9D8C" />
  <text x="245" y="48" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A₁</text>

  <circle cx="400" cy="140" r="4" fill="#7A9D8C" />
  <text x="410" y="135" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A₂</text>

  <circle cx="400" cy="280" r="4" fill="#7A9D8C" />
  <text x="410" y="285" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A₃</text>

  <circle cx="250" cy="360" r="4" fill="#7A9D8C" />
  <text x="245" y="380" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A₄</text>

  <circle cx="100" cy="280" r="4" fill="#7A9D8C" />
  <text x="70" y="285" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A₅</text>

  <circle cx="100" cy="140" r="4" fill="#7A9D8C" />
  <text x="70" y="135" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A₆</text>

  <!-- Подпись -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">Σ = (n − 2) · 180°    |    n = 6    ⇒    Σ = 720°</text>
</svg>