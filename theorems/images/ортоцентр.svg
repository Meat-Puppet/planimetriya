<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC (остроугольный) -->
  <line x1="80" y1="340" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="340" x2="260" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="260" y1="80" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Высота AA₁ -->
  <line x1="260" y1="80" x2="260" y2="340" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Высота BB₁ -->
  <line x1="80" y1="340" x2="330" y2="220" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Высота CC₁ -->
  <line x1="400" y1="340" x2="180" y2="220" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Вершины -->
  <circle cx="80" cy="340" r="5" fill="#7A9D8C" />
  <text x="55" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="340" r="5" fill="#7A9D8C" />
  <text x="415" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="260" cy="80" r="5" fill="#7A9D8C" />
  <text x="245" y="65" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Основания высот -->
  <circle cx="260" cy="340" r="4" fill="#c2410c" />
  <text x="270" y="370" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">A₁</text>

  <circle cx="330" cy="220" r="4" fill="#2563eb" />
  <text x="340" y="215" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">B₁</text>

  <circle cx="180" cy="220" r="4" fill="#16a34a" />
  <text x="150" y="215" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16a34a">C₁</text>

  <!-- Прямые углы -->
  <line x1="250" y1="330" x2="260" y2="330" stroke="#c2410c" stroke-width="1" />
  <line x1="260" y1="330" x2="260" y2="340" stroke="#c2410c" stroke-width="1" />

  <line x1="90" y1="330" x2="98" y2="330" stroke="#2563eb" stroke-width="1" />
  <line x1="98" y1="330" x2="98" y2="338" stroke="#2563eb" stroke-width="1" />

  <line x1="390" y1="330" x2="382" y2="330" stroke="#16a34a" stroke-width="1" />
  <line x1="382" y1="330" x2="382" y2="338" stroke="#16a34a" stroke-width="1" />

  <!-- Ортоцентр H -->
  <circle cx="260" cy="220" r="5" fill="#1E2321" />
  <text x="270" y="215" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1E2321">H</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">H — ортоцентр    |    AH = 2R · cos A</text>
</svg>