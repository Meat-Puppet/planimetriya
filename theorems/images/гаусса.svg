<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Четыре прямые полного четырёхсторонника -->
  <line x1="60" y1="100" x2="440" y2="100" stroke="#1E2321" stroke-width="2" />
  <line x1="60" y1="350" x2="440" y2="350" stroke="#1E2321" stroke-width="2" />
  <line x1="80" y1="60" x2="250" y2="400" stroke="#1E2321" stroke-width="2" />
  <line x1="420" y1="60" x2="250" y2="400" stroke="#1E2321" stroke-width="2" />

  <!-- Вершины пересечений -->
  <circle cx="180" cy="100" r="4" fill="#7A9D8C" />
  <circle cx="320" cy="100" r="4" fill="#7A9D8C" />
  <circle cx="130" cy="225" r="4" fill="#7A9D8C" />
  <circle cx="370" cy="225" r="4" fill="#7A9D8C" />
  <circle cx="180" cy="350" r="4" fill="#7A9D8C" />
  <circle cx="320" cy="350" r="4" fill="#7A9D8C" />

  <!-- Три диагонали -->
  <line x1="180" y1="100" x2="320" y2="350" stroke="#c2410c" stroke-width="2.5" />
  <line x1="320" y1="100" x2="180" y2="350" stroke="#2563eb" stroke-width="2.5" />
  <line x1="130" y1="225" x2="370" y2="225" stroke="#16a34a" stroke-width="2.5" />

  <!-- Середины диагоналей -->
  <circle cx="250" cy="225" r="5" fill="#c2410c" />
  <text x="260" y="220" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#c2410c">M</text>

  <circle cx="250" cy="225" r="5" fill="#2563eb" />
  <text x="240" y="240" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563eb">N</text>

  <circle cx="250" cy="225" r="5" fill="#16a34a" />
  <text x="230" y="215" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16a34a">K</text>

  <!-- Прямая Гаусса -->
  <line x1="100" y1="225" x2="400" y2="225" stroke="#9333ea" stroke-width="2.5" stroke-dasharray="8,4" />
  <text x="150" y="215" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333ea">прямая Гаусса</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">M, N, K — середины диагоналей полного четырёхсторонника    |    M, N, K коллинеарны</text>
</svg>