<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Прямоугольный треугольник ABC -->
  <line x1="80" y1="320" x2="350" y2="320" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="320" x2="80" y2="160" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="160" x2="350" y2="320" stroke="#1E2321" stroke-width="2.5" />

  <!-- Квадраты на сторонах -->
  <!-- Квадрат на катете a (BC) -->
  <line x1="80" y1="320" x2="80" y2="430" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="350" y1="320" x2="350" y2="430" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="80" y1="430" x2="350" y2="430" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />

  <!-- Квадрат на катете b (AC) -->
  <line x1="80" y1="160" x2="-30" y2="160" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="80" y1="320" x2="-30" y2="320" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="-30" y1="160" x2="-30" y2="320" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2" />

  <!-- Квадрат на гипотенузе c (AB) -->
  <line x1="80" y1="160" x2="200" y2="70" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="350" y1="320" x2="470" y2="230" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="200" y1="70" x2="470" y2="230" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" />

  <!-- Вершины -->
  <circle cx="80" cy="320" r="5" fill="#7A9D8C" />
  <text x="55" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="350" cy="320" r="5" fill="#7A9D8C" />
  <text x="365" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="80" cy="160" r="5" fill="#7A9D8C" />
  <text x="55" y="150" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Прямой угол -->
  <line x1="90" y1="310" x2="90" y2="170" stroke="#1E2321" stroke-width="1.5" />
  <line x1="80" y1="310" x2="90" y2="310" stroke="#1E2321" stroke-width="1.5" />

  <!-- Обозначения сторон -->
  <text x="210" y="345" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">a</text>
  <text x="50" y="245" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#2563eb">b</text>
  <text x="200" y="230" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#16a34a">c</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">c² = a² + b²</text>
</svg>