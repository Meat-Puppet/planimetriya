<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Первый треугольник ABC -->
  <line x1="60" y1="310" x2="160" y2="310" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="310" x2="60" y2="170" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="170" x2="160" y2="310" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины первого -->
  <circle cx="60" cy="310" r="4" fill="#7A9D8C" />
  <text x="35" y="335" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>
  <circle cx="160" cy="310" r="4" fill="#7A9D8C" />
  <text x="170" y="335" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>
  <circle cx="60" cy="170" r="4" fill="#7A9D8C" />
  <text x="35" y="165" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <!-- Угол A -->
  <path d="M 80 295 Q 90 285 85 275" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="85" y="278" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563eb">A</text>

  <!-- Угол B -->
  <path d="M 140 295 Q 130 285 125 275" fill="none" stroke="#16a34a" stroke-width="2" />
  <text x="130" y="278" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">B</text>

  <!-- Второй треугольник A₁B₁C₁ (меньшего размера) -->
  <line x1="310" y1="290" x2="380" y2="290" stroke="#1E2321" stroke-width="2" />
  <line x1="310" y1="290" x2="310" y2="190" stroke="#1E2321" stroke-width="2" />
  <line x1="310" y1="190" x2="380" y2="290" stroke="#1E2321" stroke-width="2" />

  <!-- Вершины второго -->
  <circle cx="310" cy="290" r="3" fill="#7A9D8C" />
  <text x="285" y="310" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A₁</text>
  <circle cx="380" cy="290" r="3" fill="#7A9D8C" />
  <text x="388" y="310" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">B₁</text>
  <circle cx="310" cy="190" r="3" fill="#7A9D8C" />
  <text x="285" y="188" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">C₁</text>

  <!-- Угол A₁ -->
  <path d="M 322 278 Q 328 272 325 265" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="326" y="268" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2563eb">A₁</text>

  <!-- Угол B₁ -->
  <path d="M 362 278 Q 356 272 353 265" fill="none" stroke="#16a34a" stroke-width="2" />
  <text x="354" y="268" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#16a34a">B₁</text>

  <!-- Знак подобия -->
  <text x="235" y="250" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#1E2321" text-anchor="middle">∾</text>

  <!-- Формула -->
  <text x="250" y="390" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">∠A = ∠A₁    |    ∠B = ∠B₁    ⇒    ∆ABC ∾ ∆A₁B₁C₁</text>
</svg>