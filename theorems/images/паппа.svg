<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Две прямые l1 и l2 -->
  <line x1="60" y1="120" x2="440" y2="120" stroke="#1E2321" stroke-width="2" />
  <text x="450" y="115" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">l₁</text>
  
  <line x1="60" y1="350" x2="440" y2="350" stroke="#1E2321" stroke-width="2" />
  <text x="450" y="345" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">l₂</text>

  <!-- Точки на l1: A, B, C -->
  <circle cx="120" cy="120" r="5" fill="#7A9D8C" />
  <text x="105" y="110" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A</text>
  <circle cx="250" cy="120" r="5" fill="#7A9D8C" />
  <text x="240" y="110" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">B</text>
  <circle cx="380" cy="120" r="5" fill="#7A9D8C" />
  <text x="390" y="110" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">C</text>

  <!-- Точки на l2: A', B', C' -->
  <circle cx="100" cy="350" r="5" fill="#7A9D8C" />
  <text x="80" y="375" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A'</text>
  <circle cx="250" cy="350" r="5" fill="#7A9D8C" />
  <text x="235" y="375" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">B'</text>
  <circle cx="400" cy="350" r="5" fill="#7A9D8C" />
  <text x="415" y="375" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">C'</text>

  <!-- Прямые AB' и A'B -->
  <line x1="120" y1="120" x2="250" y2="350" stroke="#c2410c" stroke-width="1.5" />
  <line x1="100" y1="350" x2="250" y2="120" stroke="#c2410c" stroke-width="1.5" />

  <!-- Прямые BC' и B'C -->
  <line x1="250" y1="120" x2="400" y2="350" stroke="#2563eb" stroke-width="1.5" />
  <line x1="250" y1="350" x2="380" y2="120" stroke="#2563eb" stroke-width="1.5" />

  <!-- Прямые CA' и C'A -->
  <line x1="380" y1="120" x2="100" y2="350" stroke="#16a34a" stroke-width="1.5" />
  <line x1="400" y1="350" x2="120" y2="120" stroke="#16a34a" stroke-width="1.5" />

  <!-- Точки пересечения P, Q, R -->
  <circle cx="185" cy="235" r="5" fill="#c2410c" />
  <text x="170" y="230" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#c2410c">P</text>

  <circle cx="315" cy="235" r="5" fill="#2563eb" />
  <text x="325" y="230" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#2563eb">Q</text>

  <circle cx="250" cy="235" r="5" fill="#16a34a" />
  <text x="260" y="230" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#16a34a">R</text>

  <!-- Прямая Паппа -->
  <line x1="120" y1="235" x2="380" y2="235" stroke="#9333ea" stroke-width="2.5" stroke-dasharray="8,4" />
  <text x="150" y="225" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333ea">прямая Паппа</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">P = AB' ∩ A'B    |    Q = BC' ∩ B'C    |    R = CA' ∩ C'A    |    P, Q, R коллинеарны</text>
</svg>