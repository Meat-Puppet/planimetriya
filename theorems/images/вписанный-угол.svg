<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="250" cy="210" r="130" fill="none" stroke="#1E2321" stroke-width="2" />

  <!-- Центр O -->
  <circle cx="250" cy="210" r="4" fill="#1E2321" />
  <text x="260" y="205" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">O</text>

  <!-- Хорда AC -->
  <line x1="150" y1="280" x2="360" y2="160" stroke="#1E2321" stroke-width="2" />

  <!-- Точки A и C -->
  <circle cx="150" cy="280" r="5" fill="#7A9D8C" />
  <text x="125" y="305" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="360" cy="160" r="5" fill="#7A9D8C" />
  <text x="375" y="155" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Точка B (вершина вписанного угла) -->
  <circle cx="180" cy="120" r="5" fill="#c2410c" />
  <text x="155" y="115" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#c2410c">B</text>

  <!-- Стороны угла -->
  <line x1="180" y1="120" x2="150" y2="280" stroke="#c2410c" stroke-width="2" />
  <line x1="180" y1="120" x2="360" y2="160" stroke="#c2410c" stroke-width="2" />

  <!-- Дуга AC -->
  <path d="M 150 280 A 130 130 0 0 1 360 160" fill="none" stroke="#2563eb" stroke-width="2.5" />
  <text x="270" y="260" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">∪AC</text>

  <!-- Вписанный угол -->
  <path d="M 175 135 Q 185 145 180 155" fill="none" stroke="#c2410c" stroke-width="2" />
  <text x="185" y="145" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">α</text>

  <!-- Центральный угол -->
  <line x1="250" y1="210" x2="150" y2="280" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="250" y1="210" x2="360" y2="160" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" />
  <path d="M 190 240 Q 210 230 220 215" fill="none" stroke="#16a34a" stroke-width="1.5" />
  <text x="195" y="245" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">2α</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">∠ABC = ½ · ∪AC</text>
</svg>