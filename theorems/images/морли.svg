<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 460" width="100%" height="100%">
  <rect width="500" height="460" fill="#f5f7fa" rx="12" />

  <!-- Исходный треугольник ABC -->
  <line x1="80" y1="350" x2="420" y2="350" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="350" x2="250" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="80" x2="420" y2="350" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="80" cy="350" r="5" fill="#7A9D8C" />
  <text x="55" y="380" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="420" cy="350" r="5" fill="#7A9D8C" />
  <text x="435" y="380" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="250" cy="80" r="5" fill="#7A9D8C" />
  <text x="235" y="65" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Трисектрисы (приблизительно) -->
  <line x1="80" y1="350" x2="200" y2="280" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2" />
  <line x1="80" y1="350" x2="220" y2="310" stroke="#2563eb" stroke-width="1" stroke-dasharray="4,2" />
  
  <line x1="420" y1="350" x2="300" y2="280" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2" />
  <line x1="420" y1="350" x2="280" y2="310" stroke="#16a34a" stroke-width="1" stroke-dasharray="4,2" />
  
  <line x1="250" y1="80" x2="200" y2="180" stroke="#9333ea" stroke-width="1" stroke-dasharray="4,2" />
  <line x1="250" y1="80" x2="300" y2="180" stroke="#9333ea" stroke-width="1" stroke-dasharray="4,2" />

  <!-- Треугольник Морли XYZ -->
  <line x1="210" y1="290" x2="290" y2="290" stroke="#c2410c" stroke-width="2.5" />
  <line x1="210" y1="290" x2="250" y2="240" stroke="#c2410c" stroke-width="2.5" />
  <line x1="290" y1="290" x2="250" y2="240" stroke="#c2410c" stroke-width="2.5" />

  <!-- Вершины треугольника Морли -->
  <circle cx="210" cy="290" r="4" fill="#c2410c" />
  <text x="195" y="285" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#c2410c">X</text>

  <circle cx="290" cy="290" r="4" fill="#c2410c" />
  <text x="300" y="285" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#c2410c">Y</text>

  <circle cx="250" cy="240" r="4" fill="#c2410c" />
  <text x="260" y="235" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#c2410c">Z</text>

  <!-- Отметки равных сторон треугольника Морли -->
  <line x1="245" y1="267" x2="250" y2="272" stroke="#c2410c" stroke-width="1.5" />
  <line x1="255" y1="267" x2="250" y2="272" stroke="#c2410c" stroke-width="1.5" />

  <!-- Подпись -->
  <text x="250" y="320" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c" text-anchor="middle">треугольник Морли</text>

  <!-- Формула -->
  <text x="250" y="450" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">Точки пересечения смежных трисектрис образуют равносторонний треугольник</text>
</svg>