<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="100%" height="100%">
  <rect width="500" height="380" fill="#f5f7fa" rx="12" />

  <!-- Трапеция ABCD -->
  <line x1="120" y1="300" x2="380" y2="300" stroke="#1E2321" stroke-width="2.5" />
  <line x1="120" y1="300" x2="80" y2="120" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="120" x2="400" y2="120" stroke="#1E2321" stroke-width="2.5" />
  <line x1="400" y1="120" x2="380" y2="300" stroke="#1E2321" stroke-width="2.5" />

  <!-- Средняя линия MN -->
  <line x1="100" y1="210" x2="390" y2="210" stroke="#c2410c" stroke-width="2.5" />

  <!-- Диагональ AC -->
  <line x1="120" y1="300" x2="400" y2="120" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Точка пересечения K -->
  <circle cx="250" cy="210" r="4" fill="#c2410c" />
  <text x="260" y="205" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">K</text>

  <!-- Вершины -->
  <circle cx="80" cy="120" r="5" fill="#7A9D8C" />
  <text x="55" y="115" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="400" cy="120" r="5" fill="#7A9D8C" />
  <text x="415" y="115" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <circle cx="380" cy="300" r="5" fill="#7A9D8C" />
  <text x="395" y="325" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">D</text>

  <circle cx="120" cy="300" r="5" fill="#7A9D8C" />
  <text x="95" y="325" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <!-- Точки M и N -->
  <circle cx="100" cy="210" r="4" fill="#c2410c" />
  <text x="75" y="205" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">M</text>

  <circle cx="390" cy="210" r="4" fill="#c2410c" />
  <text x="400" y="205" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">N</text>

  <!-- Отметки равных отрезков на AB -->
  <line x1="108" y1="255" x2="115" y2="260" stroke="#1E2321" stroke-width="1.5" />
  <line x1="92" y1="165" x2="99" y2="170" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отметки равных отрезков на CD -->
  <line x1="385" y1="165" x2="392" y2="170" stroke="#1E2321" stroke-width="1.5" />
  <line x1="385" y1="255" x2="392" y2="260" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отметки параллельности -->
  <line x1="200" y1="295" x2="210" y2="300" stroke="#1E2321" stroke-width="1.5" />
  <line x1="205" y1="290" x2="215" y2="295" stroke="#1E2321" stroke-width="1.5" />

  <line x1="200" y1="125" x2="210" y2="130" stroke="#1E2321" stroke-width="1.5" />
  <line x1="205" y1="120" x2="215" y2="125" stroke="#1E2321" stroke-width="1.5" />

  <line x1="240" y1="205" x2="250" y2="210" stroke="#c2410c" stroke-width="1.5" />
  <line x1="245" y1="200" x2="255" y2="205" stroke="#c2410c" stroke-width="1.5" />

  <!-- Обозначения -->
  <text x="230" y="230" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">MN</text>
  <text x="230" y="320" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">AD</text>
  <text x="230" y="105" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">BC</text>

  <!-- Формула -->
  <text x="250" y="370" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">MN ∥ BC ∥ AD    |    MN = (BC + AD) / 2</text>
</svg>