<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="340" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="340" x2="250" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="80" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Продолжения сторон (пунктиром) -->
  <line x1="50" y1="340" x2="80" y2="340" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="250" y1="80" x2="280" y2="50" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="80" y1="340" x2="60" y2="370" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="4,2" />

  <!-- Секущая прямая -->
  <line x1="40" y1="280" x2="420" y2="370" stroke="#c2410c" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="80" cy="340" r="5" fill="#7A9D8C" />
  <text x="55" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="340" r="5" fill="#7A9D8C" />
  <text x="415" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="250" cy="80" r="5" fill="#7A9D8C" />
  <text x="235" y="65" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Точки пересечения -->
  <circle cx="200" cy="340" r="4" fill="#c2410c" />
  <text x="185" y="365" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">D</text>

  <circle cx="140" cy="210" r="4" fill="#c2410c" />
  <text x="115" y="205" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">E</text>

  <circle cx="260" cy="52" r="4" fill="#c2410c" />
  <text x="270" y="48" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">F</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">(BD/DC) · (CE/EA) · (AF/FB) = 1</text>
</svg>