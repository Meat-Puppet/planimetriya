<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="60" y1="340" x2="420" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="340" x2="240" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="240" y1="80" x2="420" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Чевиана AD -->
  <line x1="240" y1="80" x2="280" y2="340" stroke="#c2410c" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="60" cy="340" r="5" fill="#7A9D8C" />
  <text x="35" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="420" cy="340" r="5" fill="#7A9D8C" />
  <text x="435" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <circle cx="240" cy="80" r="5" fill="#7A9D8C" />
  <text x="225" y="65" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <!-- Точка D -->
  <circle cx="280" cy="340" r="5" fill="#c2410c" />
  <text x="285" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#c2410c">D</text>

  <!-- Обозначения сторон -->
  <!-- a = BC -->
  <text x="235" y="365" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">a</text>
  
  <!-- b = AC -->
  <text x="340" y="210" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  
  <!-- c = AB -->
  <text x="120" y="210" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>
  
  <!-- d = AD -->
  <text x="245" y="200" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">d</text>

  <!-- m = BD -->
  <text x="160" y="360" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">m</text>
  
  <!-- n = DC -->
  <text x="350" y="360" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">n</text>

  <!-- Дуги углов -->
  <path d="M 90 325 Q 105 310 100 295" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="75" y="300" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">B</text>

  <path d="M 390 325 Q 380 310 375 295" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="395" y="300" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">C</text>

  <path d="M 215 110 Q 230 120 235 110" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="220" y="100" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A</text>

  <!-- Формула -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">b²m + c²n = a(d² + mn)</text>
</svg>