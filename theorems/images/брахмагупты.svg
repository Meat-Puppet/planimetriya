<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="250" cy="210" r="140" fill="none" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Вписанный четырёхугольник ABCD -->
  <line x1="120" y1="300" x2="340" y2="315" stroke="#1E2321" stroke-width="2.5" />
  <line x1="340" y1="315" x2="380" y2="130" stroke="#1E2321" stroke-width="2.5" />
  <line x1="380" y1="130" x2="150" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="150" y1="100" x2="120" y2="300" stroke="#1E2321" stroke-width="2.5" />

  <!-- Диагональ BD -->
  <line x1="150" y1="100" x2="340" y2="315" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Вершины -->
  <circle cx="120" cy="300" r="5" fill="#7A9D8C" />
  <text x="95" y="325" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="340" cy="315" r="5" fill="#7A9D8C" />
  <text x="355" y="340" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="380" cy="130" r="5" fill="#7A9D8C" />
  <text x="395" y="125" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <circle cx="150" cy="100" r="5" fill="#7A9D8C" />
  <text x="125" y="95" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">D</text>

  <!-- Обозначения сторон -->
  <text x="220" y="320" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">a</text>
  <text x="370" y="225" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  <text x="250" y="105" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>
  <text x="115" y="200" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">d</text>

  <!-- Формула -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">S = √((p−a)(p−b)(p−c)(p−d))    |    p = (a+b+c+d)/2</text>
</svg>