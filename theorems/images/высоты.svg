<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC (остроугольный) -->
  <line x1="80" y1="350" x2="420" y2="350" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="350" x2="280" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="280" y1="80" x2="420" y2="350" stroke="#1E2321" stroke-width="2.5" />

  <!-- Высота AA₁ -->
  <line x1="280" y1="80" x2="280" y2="350" stroke="#c2410c" stroke-width="2.5" stroke-dasharray="8,4" />

  <!-- Высота BB₁ -->
  <line x1="80" y1="350" x2="335" y2="230" stroke="#2563eb" stroke-width="2.5" stroke-dasharray="8,4" />

  <!-- Высота CC₁ -->
  <line x1="420" y1="350" x2="185" y2="230" stroke="#16a34a" stroke-width="2.5" stroke-dasharray="8,4" />

  <!-- Вершины -->
  <circle cx="80" cy="350" r="5" fill="#7A9D8C" />
  <text x="55" y="380" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="420" cy="350" r="5" fill="#7A9D8C" />
  <text x="435" y="380" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <circle cx="280" cy="80" r="5" fill="#7A9D8C" />
  <text x="265" y="65" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <!-- Основания высот -->
  <circle cx="280" cy="350" r="4" fill="#c2410c" />
  <text x="285" y="380" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">A₁</text>

  <circle cx="335" cy="230" r="4" fill="#2563eb" />
  <text x="345" y="225" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#2563eb">B₁</text>

  <circle cx="185" cy="230" r="4" fill="#16a34a" />
  <text x="155" y="225" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#16a34a">C₁</text>

  <!-- Прямые углы -->
  <line x1="270" y1="340" x2="280" y2="340" stroke="#c2410c" stroke-width="1.5" />
  <line x1="280" y1="340" x2="280" y2="350" stroke="#c2410c" stroke-width="1.5" />

  <line x1="90" y1="340" x2="98" y2="340" stroke="#2563eb" stroke-width="1.5" />
  <line x1="98" y1="340" x2="98" y2="348" stroke="#2563eb" stroke-width="1.5" />

  <line x1="410" y1="340" x2="402" y2="340" stroke="#16a34a" stroke-width="1.5" />
  <line x1="402" y1="340" x2="402" y2="348" stroke="#16a34a" stroke-width="1.5" />

  <!-- Точка пересечения H -->
  <circle cx="280" cy="230" r="5" fill="#1E2321" />
  <text x="290" y="225" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1E2321">H</text>

  <!-- Обозначения высот -->
  <text x="260" y="220" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">hₐ</text>
  <text x="200" y="300" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">h_b</text>
  <text x="340" y="300" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16a34a">h_c</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">hₐ = 2S / a = b·sin C = c·sin B</text>
</svg>