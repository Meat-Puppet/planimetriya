<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="320" x2="400" y2="320" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="320" x2="250" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="100" x2="400" y2="320" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="80" cy="320" r="5" fill="#7A9D8C" />
  <text x="55" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="250" cy="100" r="5" fill="#7A9D8C" />
  <text x="235" y="85" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="400" cy="320" r="5" fill="#7A9D8C" />
  <text x="415" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Обозначения сторон -->
  <text x="230" y="345" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">a</text>
  <text x="340" y="345" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  <text x="150" y="200" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>

  <!-- Дуга угла A -->
  <path d="M 110 305 Q 125 290 120 275" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="95" y="280" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>

  <!-- Дуга угла B -->
  <path d="M 220 130 Q 235 140 240 130" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="225" y="120" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>

  <!-- Дуга угла C -->
  <path d="M 370 305 Q 360 290 355 275" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="375" y="280" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <!-- Формула под чертежом -->
  <text x="250" y="385" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">(a − b) / (a + b) = tg((A − B)/2) / tg((A + B)/2)</text>
</svg>