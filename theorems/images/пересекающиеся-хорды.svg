<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="250" cy="210" r="130" fill="none" stroke="#1E2321" stroke-width="2" />

  <!-- Центр O -->
  <circle cx="250" cy="210" r="4" fill="#1E2321" />
  <text x="260" y="205" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">O</text>

  <!-- Хорда AB -->
  <line x1="140" y1="140" x2="370" y2="310" stroke="#c2410c" stroke-width="2.5" />

  <!-- Хорда CD -->
  <line x1="350" y1="130" x2="150" y2="300" stroke="#2563eb" stroke-width="2.5" />

  <!-- Точки A, B -->
  <circle cx="140" cy="140" r="5" fill="#7A9D8C" />
  <text x="115" y="135" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="370" cy="310" r="5" fill="#7A9D8C" />
  <text x="385" y="315" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <!-- Точки C, D -->
  <circle cx="350" cy="130" r="5" fill="#7A9D8C" />
  <text x="365" y="125" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <circle cx="150" cy="300" r="5" fill="#7A9D8C" />
  <text x="120" y="310" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">D</text>

  <!-- Точка пересечения E -->
  <circle cx="250" cy="225" r="5" fill="#1E2321" />
  <text x="260" y="220" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1E2321">E</text>

  <!-- Отрезки AC и BD (пунктиром) -->
  <line x1="140" y1="140" x2="350" y2="130" stroke="#1E2321" stroke-width="1" stroke-dasharray="4,2" opacity="0.5" />
  <line x1="370" y1="310" x2="150" y2="300" stroke="#1E2321" stroke-width="1" stroke-dasharray="4,2" opacity="0.5" />

  <!-- Обозначения отрезков -->
  <text x="185" y="175" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">AE</text>
  <text x="310" y="275" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">EB</text>
  <text x="310" y="170" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">CE</text>
  <text x="190" y="275" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">ED</text>

  <!-- Формула -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">AE · EB = CE · ED</text>
</svg>