<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="300" x2="350" y2="300" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="300" x2="220" y2="120" stroke="#1E2321" stroke-width="2.5" />
  <line x1="220" y1="120" x2="350" y2="300" stroke="#1E2321" stroke-width="2.5" />

  <!-- Продолжение стороны AC за точку C -->
  <line x1="350" y1="300" x2="450" y2="300" stroke="#1E2321" stroke-width="2.5" stroke-dasharray="8,4" />

  <!-- Вершины -->
  <circle cx="80" cy="300" r="5" fill="#7A9D8C" />
  <text x="55" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="220" cy="120" r="5" fill="#7A9D8C" />
  <text x="205" y="105" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="350" cy="300" r="5" fill="#7A9D8C" />
  <text x="365" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Точка D -->
  <circle cx="450" cy="300" r="4" fill="#1E2321" />
  <text x="462" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">D</text>

  <!-- Дуга угла A -->
  <path d="M 110 285 Q 125 270 120 255" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="95" y="260" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>

  <!-- Дуга угла B -->
  <path d="M 185 175 Q 220 200 255 175" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="212" y="210" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>

  <!-- Дуга угла C -->
  <path d="M 320 285 Q 310 270 315 255" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="290" y="260" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <!-- Внешний угол BCD -->
  <path d="M 355 280 Q 385 260 410 275" fill="none" stroke="#c2410c" stroke-width="2.5" />
  <text x="380" y="265" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">внешний угол</text>
</svg>