<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 460" width="100%" height="100%">
  <rect width="500" height="460" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="350" x2="420" y2="350" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="350" x2="250" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="80" x2="420" y2="350" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="80" cy="350" r="5" fill="#7A9D8C" />
  <text x="55" y="380" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="420" cy="350" r="5" fill="#7A9D8C" />
  <text x="435" y="380" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="250" cy="80" r="5" fill="#7A9D8C" />
  <text x="235" y="65" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Точки на сторонах -->
  <circle cx="260" cy="350" r="4" fill="#c2410c" />
  <text x="270" y="375" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">A₁</text>

  <circle cx="310" cy="215" r="4" fill="#2563eb" />
  <text x="320" y="210" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">B₁</text>

  <circle cx="180" cy="215" r="4" fill="#16a34a" />
  <text x="150" y="210" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16a34a">C₁</text>

  <!-- Перпендикуляры -->
  <line x1="260" y1="350" x2="260" y2="270" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="310" y1="215" x2="350" y2="175" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="180" y1="215" x2="150" y2="185" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Точка пересечения O -->
  <circle cx="260" cy="240" r="5" fill="#9333ea" />
  <text x="270" y="235" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#9333ea">O</text>

  <!-- Прямые углы -->
  <line x1="250" y1="340" x2="258" y2="340" stroke="#c2410c" stroke-width="1" />
  <line x1="258" y1="340" x2="258" y2="348" stroke="#c2410c" stroke-width="1" />

  <line x1="305" y1="210" x2="312" y2="207" stroke="#2563eb" stroke-width="1" />
  <line x1="312" y1="207" x2="315" y2="214" stroke="#2563eb" stroke-width="1" />

  <line x1="175" y1="210" x2="168" y2="207" stroke="#16a34a" stroke-width="1" />
  <line x1="168" y1="207" x2="165" y2="214" stroke="#16a34a" stroke-width="1" />

  <!-- Формула -->
  <text x="250" y="450" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#1E2321" text-anchor="middle">(BA₁² − A₁C²) + (CB₁² − B₁A²) + (AC₁² − C₁B²) = 0</text>
</svg>