<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC (равнобедренный) -->
  <line x1="80" y1="320" x2="420" y2="320" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="320" x2="250" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="100" x2="420" y2="320" stroke="#1E2321" stroke-width="2.5" />

  <!-- Биссектриса/медиана/высота CD -->
  <line x1="250" y1="100" x2="250" y2="320" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Вершины -->
  <circle cx="80" cy="320" r="5" fill="#7A9D8C" />
  <text x="55" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="420" cy="320" r="5" fill="#7A9D8C" />
  <text x="435" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="250" cy="100" r="5" fill="#7A9D8C" />
  <text x="235" y="85" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Точка D -->
  <circle cx="250" cy="320" r="4" fill="#c2410c" />
  <text x="260" y="350" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">D</text>

  <!-- Отметки равных сторон -->
  <line x1="155" y1="215" x2="165" y2="220" stroke="#1E2321" stroke-width="1.5" />
  <line x1="335" y1="215" x2="345" y2="220" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отметки равных отрезков основания -->
  <line x1="160" y1="312" x2="170" y2="322" stroke="#1E2321" stroke-width="1.5" />
  <line x1="330" y1="312" x2="340" y2="322" stroke="#1E2321" stroke-width="1.5" />

  <!-- Дуги углов A и B -->
  <path d="M 110 305 Q 125 290 120 275" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="95" y="280" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#2563eb">α</text>

  <path d="M 380 305 Q 370 290 365 275" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="385" y="280" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#2563eb">α</text>

  <!-- Угол при вершине C -->
  <path d="M 220 130 Q 250 150 280 130" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="242" y="150" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">γ</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">AC = BC  ⇒  ∠A = ∠B = α  •  γ = 180° − 2α</text>
</svg>