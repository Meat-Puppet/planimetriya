<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 460" width="100%" height="100%">
  <rect width="500" height="460" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="340" x2="400" y2="340" stroke="#1E2321" stroke-width="2" />
  <line x1="80" y1="340" x2="260" y2="80" stroke="#1E2321" stroke-width="2" />
  <line x1="260" y1="80" x2="400" y2="340" stroke="#1E2321" stroke-width="2" />

  <!-- Вершины -->
  <circle cx="80" cy="340" r="4" fill="#7A9D8C" />
  <text x="55" y="365" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>
  <circle cx="400" cy="340" r="4" fill="#7A9D8C" />
  <text x="415" y="365" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>
  <circle cx="260" cy="80" r="4" fill="#7A9D8C" />
  <text x="245" y="65" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <!-- Окружность девяти точек -->
  <circle cx="245" cy="240" r="75" fill="none" stroke="#c2410c" stroke-width="2.5" />
  <text x="310" y="180" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">окр. 9 точек</text>

  <!-- Центр N -->
  <circle cx="245" cy="240" r="4" fill="#c2410c" />
  <text x="255" y="235" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#c2410c">N</text>

  <!-- Вписанная окружность -->
  <circle cx="235" cy="270" r="35" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="175" y="290" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#2563eb">вписанная</text>

  <!-- Центр I -->
  <circle cx="235" cy="270" r="3" fill="#2563eb" />
  <text x="225" y="265" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="700" fill="#2563eb">I</text>

  <!-- Вневписанная окружность (одна из трёх) -->
  <circle cx="350" cy="180" r="45" fill="none" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" />
  <text x="370" y="145" font-family="'Segoe UI', sans-serif" font-size="12" font-weight="600" fill="#16a34a">вневписанная</text>

  <!-- Точка касания (Фейербаха) -->
  <circle cx="210" cy="250" r="5" fill="#9333ea" />
  <text x="185" y="245" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="700" fill="#9333ea">F</text>

  <!-- Прямая N-I -->
  <line x1="245" y1="240" x2="235" y2="270" stroke="#1E2321" stroke-width="1" stroke-dasharray="3,2" />

  <!-- Формула -->
  <text x="250" y="450" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">Окружность девяти точек касается вписанной (внутренне) и трёх вневписанных (внешне)</text>
</svg>