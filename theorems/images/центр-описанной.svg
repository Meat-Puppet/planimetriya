<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Описанная окружность -->
  <circle cx="240" cy="220" r="130" fill="none" stroke="#c2410c" stroke-width="2" />

  <!-- Треугольник ABC -->
  <line x1="120" y1="310" x2="370" y2="310" stroke="#1E2321" stroke-width="2.5" />
  <line x1="120" y1="310" x2="260" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="260" y1="100" x2="370" y2="310" stroke="#1E2321" stroke-width="2.5" />

  <!-- Серединные перпендикуляры -->
  <line x1="245" y1="310" x2="245" y2="205" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3" />
  <line x1="190" y1="205" x2="260" y2="205" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3" />
  <line x1="315" y1="205" x2="370" y2="205" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Вершины -->
  <circle cx="120" cy="310" r="5" fill="#7A9D8C" />
  <text x="95" y="340" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="370" cy="310" r="5" fill="#7A9D8C" />
  <text x="385" y="340" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="260" cy="100" r="5" fill="#7A9D8C" />
  <text x="245" y="85" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Середины сторон -->
  <circle cx="245" cy="310" r="4" fill="#2563eb" />
  <circle cx="190" cy="205" r="4" fill="#2563eb" />
  <circle cx="315" cy="205" r="4" fill="#2563eb" />

  <!-- Центр O -->
  <circle cx="240" cy="220" r="5" fill="#c2410c" />
  <text x="250" y="215" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#c2410c">O</text>

  <!-- Радиус R -->
  <line x1="240" y1="220" x2="260" y2="100" stroke="#c2410c" stroke-width="1.5" />
  <text x="260" y="160" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#c2410c">R</text>

  <!-- Отметки прямых углов -->
  <line x1="235" y1="310" x2="235" y2="300" stroke="#2563eb" stroke-width="1" />
  <line x1="235" y1="300" x2="245" y2="300" stroke="#2563eb" stroke-width="1" />

  <!-- Формула -->
  <text x="250" y="415" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">O — центр описанной окружности    |    R = abc / (4S)</text>
</svg>