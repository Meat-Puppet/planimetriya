<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="100%" height="100%">
  <rect width="500" height="450" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="250" cy="220" r="140" fill="none" stroke="#7A9D8C" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Центр окружности -->
  <circle cx="250" cy="220" r="4" fill="#1E2321" />
  <text x="235" y="215" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">O</text>

  <!-- Треугольник ABC внутри окружности -->
  <line x1="120" y1="300" x2="370" y2="300" stroke="#1E2321" stroke-width="2.5" />
  <line x1="120" y1="300" x2="300" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="300" y1="100" x2="370" y2="300" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины треугольника -->
  <circle cx="120" cy="300" r="5" fill="#7A9D8C" />
  <text x="95" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="300" cy="100" r="5" fill="#7A9D8C" />
  <text x="285" y="85" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="370" cy="300" r="5" fill="#7A9D8C" />
  <text x="385" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Обозначения сторон -->
  <text x="235" y="325" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">a</text>
  <text x="190" y="200" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  <text x="320" y="200" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>

  <!-- Радиус -->
  <line x1="250" y1="220" x2="300" y2="100" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="4,2" />
  <text x="260" y="155" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">R</text>

  <!-- Дуги углов -->
  <path d="M 145 285 Q 155 270 150 255" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="125" y="260" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A</text>

  <path d="M 270 125 Q 285 135 290 125" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="275" y="115" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">B</text>

  <path d="M 345 285 Q 340 270 335 255" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="350" y="260" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">C</text>

  <!-- Формула под чертежом -->
  <text x="250" y="400" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">a / sin A = b / sin B = c / sin C = 2R</text>
</svg>