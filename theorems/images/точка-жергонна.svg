<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="340" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="340" x2="250" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="80" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вписанная окружность -->
  <circle cx="240" cy="250" r="45" fill="none" stroke="#c2410c" stroke-width="2" />

  <!-- Инцентр I -->
  <circle cx="240" cy="250" r="4" fill="#c2410c" />
  <text x="250" y="245" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#c2410c">I</text>

  <!-- Вершины -->
  <circle cx="80" cy="340" r="5" fill="#7A9D8C" />
  <text x="55" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="340" r="5" fill="#7A9D8C" />
  <text x="415" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="250" cy="80" r="5" fill="#7A9D8C" />
  <text x="235" y="65" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Точки касания -->
  <circle cx="230" cy="340" r="4" fill="#2563eb" />
  <text x="235" y="370" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">A₁</text>

  <circle cx="320" cy="300" r="4" fill="#2563eb" />
  <text x="330" y="295" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">B₁</text>

  <circle cx="170" cy="210" r="4" fill="#2563eb" />
  <text x="140" y="205" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">C₁</text>

  <!-- Чевианы -->
  <line x1="80" y1="340" x2="230" y2="340" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="400" y1="340" x2="320" y2="300" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="250" y1="80" x2="170" y2="210" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Точка Жергонна Ge -->
  <circle cx="235" cy="275" r="5" fill="#1E2321" />
  <text x="245" y="270" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E2321">Ge</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">AA₁ ∩ BB₁ ∩ CC₁ = Ge</text>
</svg>