<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="250" cy="210" r="140" fill="none" stroke="#1E2321" stroke-width="2" />

  <!-- Центр O -->
  <circle cx="250" cy="210" r="5" fill="#1E2321" />
  <text x="260" y="205" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">O</text>

  <!-- Радиусы -->
  <line x1="250" y1="210" x2="120" y2="290" stroke="#c2410c" stroke-width="2.5" />
  <line x1="250" y1="210" x2="380" y2="150" stroke="#c2410c" stroke-width="2.5" />

  <!-- Точки A и B -->
  <circle cx="120" cy="290" r="5" fill="#7A9D8C" />
  <text x="95" y="315" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="380" cy="150" r="5" fill="#7A9D8C" />
  <text x="395" y="145" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <!-- Дуга AB -->
  <path d="M 120 290 A 140 140 0 0 1 380 150" fill="none" stroke="#2563eb" stroke-width="3" />
  <text x="280" y="260" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#2563eb">∪AB</text>

  <!-- Центральный угол -->
  <path d="M 180 240 Q 210 220 230 200" fill="none" stroke="#c2410c" stroke-width="2" />
  <text x="190" y="235" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">α</text>

  <!-- Обозначения радиусов -->
  <text x="170" y="255" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">R</text>
  <text x="320" y="175" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">R</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">∠AOB = ∪AB</text>
</svg>