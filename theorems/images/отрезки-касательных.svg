<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="250" cy="230" r="90" fill="none" stroke="#1E2321" stroke-width="2" />

  <!-- Центр O -->
  <circle cx="250" cy="230" r="4" fill="#1E2321" />
  <text x="260" y="225" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">O</text>

  <!-- Точка A вне окружности -->
  <circle cx="250" cy="60" r="5" fill="#7A9D8C" />
  <text x="260" y="55" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <!-- Касательные AB и AC -->
  <line x1="250" y1="60" x2="170" y2="200" stroke="#c2410c" stroke-width="2.5" />
  <line x1="250" y1="60" x2="330" y2="200" stroke="#c2410c" stroke-width="2.5" />

  <!-- Точки касания B и C -->
  <circle cx="170" cy="200" r="5" fill="#7A9D8C" />
  <text x="145" y="195" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="330" cy="200" r="5" fill="#7A9D8C" />
  <text x="345" y="195" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Радиусы OB и OC -->
  <line x1="250" y1="230" x2="170" y2="200" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="250" y1="230" x2="330" y2="200" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2" />

  <!-- Прямые углы -->
  <line x1="180" y1="215" x2="188" y2="210" stroke="#1E2321" stroke-width="1" />
  <line x1="183" y1="218" x2="188" y2="213" stroke="#1E2321" stroke-width="1" />

  <line x1="312" y1="215" x2="320" y2="210" stroke="#1E2321" stroke-width="1" />
  <line x1="315" y1="218" x2="320" y2="213" stroke="#1E2321" stroke-width="1" />

  <!-- Отрезок AO -->
  <line x1="250" y1="60" x2="250" y2="230" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Отметки равных отрезков -->
  <line x1="210" y1="130" x2="218" y2="135" stroke="#c2410c" stroke-width="1.5" />
  <line x1="282" y1="130" x2="290" y2="135" stroke="#c2410c" stroke-width="1.5" />

  <!-- Обозначения -->
  <text x="195" y="125" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">AB</text>
  <text x="290" y="125" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">AC</text>
  <text x="230" y="150" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#16a34a">AO</text>
  <text x="200" y="225" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#2563eb">R</text>
  <text x="300" y="225" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#2563eb">R</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">AB = AC</text>
</svg>