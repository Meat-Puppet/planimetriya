<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Угол O -->
  <line x1="60" y1="320" x2="420" y2="320" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="320" x2="200" y2="120" stroke="#1E2321" stroke-width="2.5" />

  <!-- Точки на сторонах -->
  <!-- На горизонтальной стороне: O, A, B -->
  <circle cx="60" cy="320" r="5" fill="#7A9D8C" />
  <text x="40" y="345" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">O</text>

  <circle cx="180" cy="320" r="4" fill="#7A9D8C" />
  <text x="170" y="345" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>

  <circle cx="340" cy="320" r="4" fill="#7A9D8C" />
  <text x="350" y="345" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>

  <!-- На наклонной стороне: C, D -->
  <circle cx="130" cy="200" r="4" fill="#7A9D8C" />
  <text x="115" y="195" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <circle cx="180" cy="120" r="4" fill="#7A9D8C" />
  <text x="190" y="115" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">D</text>

  <!-- Параллельные прямые AC и BD -->
  <line x1="180" y1="320" x2="130" y2="200" stroke="#c2410c" stroke-width="2" />
  <line x1="340" y1="320" x2="180" y2="120" stroke="#2563eb" stroke-width="2" />

  <!-- Отметки параллельности -->
  <line x1="210" y1="290" x2="220" y2="295" stroke="#c2410c" stroke-width="1.5" />
  <line x1="215" y1="285" x2="225" y2="290" stroke="#c2410c" stroke-width="1.5" />

  <line x1="260" y1="240" x2="270" y2="245" stroke="#2563eb" stroke-width="1.5" />
  <line x1="265" y1="235" x2="275" y2="240" stroke="#2563eb" stroke-width="1.5" />

  <!-- Обозначения отрезков -->
  <text x="110" y="335" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321">OA</text>
  <text x="260" y="335" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321">AB</text>
  <text x="90" y="260" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321">OC</text>
  <text x="150" y="155" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321">CD</text>

  <!-- Формула -->
  <text x="250" y="390" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">AC ∥ BD  ⇒  OA/OB = OC/OD</text>
</svg>