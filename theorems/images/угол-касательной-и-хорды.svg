<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="200" cy="210" r="130" fill="none" stroke="#1E2321" stroke-width="2" />

  <!-- Центр O -->
  <circle cx="200" cy="210" r="4" fill="#1E2321" />
  <text x="210" y="205" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">O</text>

  <!-- Касательная l в точке A -->
  <line x1="60" y1="140" x2="340" y2="140" stroke="#c2410c" stroke-width="2.5" />

  <!-- Точка касания A -->
  <circle cx="200" cy="140" r="5" fill="#7A9D8C" />
  <text x="175" y="130" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <!-- Точка C на касательной -->
  <circle cx="320" cy="140" r="4" fill="#c2410c" />
  <text x="330" y="135" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">C</text>

  <!-- Хорда AB -->
  <line x1="200" y1="140" x2="280" y2="300" stroke="#2563eb" stroke-width="2.5" />

  <!-- Точка B -->
  <circle cx="280" cy="300" r="5" fill="#7A9D8C" />
  <text x="295" y="310" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <!-- Диаметр AD -->
  <line x1="200" y1="140" x2="200" y2="340" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Точка D -->
  <circle cx="200" cy="340" r="4" fill="#1E2321" />
  <text x="185" y="365" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">D</text>

  <!-- Дуга AB -->
  <path d="M 200 140 A 130 130 0 0 0 280 300" fill="none" stroke="#16a34a" stroke-width="2.5" />
  <text x="230" y="230" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16a34a">∪AB</text>

  <!-- Угол между касательной и хордой -->
  <path d="M 215 140 Q 225 150 220 160" fill="none" stroke="#c2410c" stroke-width="2" />
  <text x="225" y="155" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">α</text>

  <!-- Прямой угол между касательной и радиусом -->
  <line x1="210" y1="140" x2="210" y2="150" stroke="#1E2321" stroke-width="1" />
  <line x1="200" y1="150" x2="210" y2="150" stroke="#1E2321" stroke-width="1" />

  <!-- Подпись касательной -->
  <text x="345" y="145" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">l</text>

  <!-- Формула -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">∠CAB = ½ · ∪AB</text>
</svg>