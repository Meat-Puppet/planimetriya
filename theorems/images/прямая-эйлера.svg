<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 450" width="100%" height="100%">
  <rect width="500" height="450" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="340" x2="400" y2="340" stroke="#1E2321" stroke-width="2" />
  <line x1="80" y1="340" x2="260" y2="80" stroke="#1E2321" stroke-width="2" />
  <line x1="260" y1="80" x2="400" y2="340" stroke="#1E2321" stroke-width="2" />

  <!-- Вершины -->
  <circle cx="80" cy="340" r="5" fill="#7A9D8C" />
  <text x="55" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="340" r="5" fill="#7A9D8C" />
  <text x="415" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="260" cy="80" r="5" fill="#7A9D8C" />
  <text x="245" y="65" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Центр описанной окружности O -->
  <circle cx="230" cy="230" r="5" fill="#c2410c" />
  <text x="215" y="220" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#c2410c">O</text>

  <!-- Центроид G -->
  <circle cx="247" cy="253" r="5" fill="#2563eb" />
  <text x="257" y="248" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563eb">G</text>

  <!-- Ортоцентр H -->
  <circle cx="280" cy="295" r="5" fill="#16a34a" />
  <text x="290" y="300" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#16a34a">H</text>

  <!-- Прямая Эйлера -->
  <line x1="200" y1="200" x2="300" y2="330" stroke="#9333ea" stroke-width="2.5" stroke-dasharray="8,4" />
  <text x="310" y="330" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333ea">прямая Эйлера</text>

  <!-- Описанная окружность -->
  <circle cx="230" cy="230" r="95" fill="none" stroke="#c2410c" stroke-width="1" stroke-dasharray="4,2" opacity="0.5" />

  <!-- Медианы -->
  <line x1="260" y1="80" x2="240" y2="340" stroke="#2563eb" stroke-width="1" opacity="0.4" />
  <line x1="80" y1="340" x2="330" y2="210" stroke="#2563eb" stroke-width="1" opacity="0.4" />
  <line x1="400" y1="340" x2="170" y2="210" stroke="#2563eb" stroke-width="1" opacity="0.4" />

  <!-- Высоты -->
  <line x1="260" y1="80" x2="260" y2="340" stroke="#16a34a" stroke-width="1" opacity="0.4" />
  <line x1="80" y1="340" x2="330" y2="220" stroke="#16a34a" stroke-width="1" opacity="0.4" />
  <line x1="400" y1="340" x2="180" y2="220" stroke="#16a34a" stroke-width="1" opacity="0.4" />

  <!-- Формула -->
  <text x="250" y="440" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">O, G, H лежат на одной прямой    |    HG = 2·GO</text>
</svg>