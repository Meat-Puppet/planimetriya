<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Описанная окружность -->
  <circle cx="250" cy="220" r="150" fill="none" stroke="#1E2321" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Центр описанной окружности O -->
  <circle cx="250" cy="220" r="5" fill="#1E2321" />
  <text x="260" y="215" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1E2321">O</text>

  <!-- Треугольник ABC -->
  <line x1="120" y1="320" x2="380" y2="320" stroke="#1E2321" stroke-width="2.5" />
  <line x1="120" y1="320" x2="280" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="280" y1="100" x2="380" y2="320" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="120" cy="320" r="5" fill="#7A9D8C" />
  <text x="95" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="280" cy="100" r="5" fill="#7A9D8C" />
  <text x="265" y="85" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="380" cy="320" r="5" fill="#7A9D8C" />
  <text x="395" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Вписанная окружность -->
  <circle cx="250" cy="270" r="40" fill="none" stroke="#c2410c" stroke-width="2" />

  <!-- Центр вписанной окружности I -->
  <circle cx="250" cy="270" r="5" fill="#c2410c" />
  <text x="260" y="265" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#c2410c">I</text>

  <!-- Отрезок OI -->
  <line x1="250" y1="220" x2="250" y2="270" stroke="#2563eb" stroke-width="2.5" />
  <text x="230" y="248" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">d</text>

  <!-- Радиус R -->
  <line x1="250" y1="220" x2="310" y2="130" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="4,2" />
  <text x="270" y="170" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321">R</text>

  <!-- Радиус r -->
  <line x1="250" y1="270" x2="250" y2="310" stroke="#c2410c" stroke-width="1.5" stroke-dasharray="4,2" />
  <text x="260" y="295" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#c2410c">r</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">OI² = R² − 2Rr = R(R − 2r)</text>
</svg>