<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="100%" height="100%">
  <!-- Фон -->
  <rect width="500" height="380" fill="#f5f7fa" rx="12" />

  <!-- Прямая MN (параллельна AC) -->
  <line x1="60" y1="120" x2="440" y2="120" stroke="#1E2321" stroke-width="2.5" />

  <!-- Точки на прямой -->
  <circle cx="60" cy="120" r="4" fill="#1E2321" />
  <text x="45" y="110" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">M</text>

  <circle cx="440" cy="120" r="4" fill="#1E2321" />
  <text x="450" y="110" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">N</text>

  <!-- Треугольник ABC -->
  <!-- Сторона AC -->
  <line x1="100" y1="300" x2="400" y2="300" stroke="#1E2321" stroke-width="2.5" />
  <!-- Сторона AB -->
  <line x1="100" y1="300" x2="250" y2="120" stroke="#1E2321" stroke-width="2.5" />
  <!-- Сторона BC -->
  <line x1="250" y1="120" x2="400" y2="300" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины треугольника -->
  <circle cx="100" cy="300" r="5" fill="#7A9D8C" />
  <text x="75" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="250" cy="120" r="5" fill="#7A9D8C" />
  <text x="235" y="105" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="400" cy="300" r="5" fill="#7A9D8C" />
  <text x="415" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Обозначение параллельности -->
  <line x1="120" y1="290" x2="145" y2="290" stroke="#1E2321" stroke-width="2" />
  <line x1="130" y1="286" x2="150" y2="286" stroke="#1E2321" stroke-width="2" />

  <line x1="330" y1="290" x2="355" y2="290" stroke="#1E2321" stroke-width="2" />
  <line x1="340" y1="286" x2="360" y2="286" stroke="#1E2321" stroke-width="2" />

  <!-- Дуга угла 1 -->
  <path d="M 175 140 Q 185 155 195 150" fill="none" stroke="#c2410c" stroke-width="2.5" />
  <text x="175" y="135" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">1</text>

  <!-- Дуга угла 2 -->
  <path d="M 310 150 Q 320 155 330 140" fill="none" stroke="#c2410c" stroke-width="2.5" />
  <text x="325" y="135" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">2</text>

  <!-- Дуга угла B -->
  <path d="M 210 170 Q 250 195 290 170" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="242" y="205" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>

  <!-- Дуга угла A -->
  <path d="M 130 280 Q 145 265 140 250" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="115" y="255" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>

  <!-- Дуга угла C -->
  <path d="M 370 250 Q 360 265 375 280" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="390" y="255" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>
</svg>