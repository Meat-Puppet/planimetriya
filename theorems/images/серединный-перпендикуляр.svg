<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Отрезок AB -->
  <line x1="100" y1="300" x2="400" y2="300" stroke="#1E2321" stroke-width="3" />

  <!-- Серединный перпендикуляр l -->
  <line x1="250" y1="60" x2="250" y2="380" stroke="#c2410c" stroke-width="2.5" stroke-dasharray="8,4" />

  <!-- Концы отрезка -->
  <circle cx="100" cy="300" r="5" fill="#7A9D8C" />
  <text x="75" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="300" r="5" fill="#7A9D8C" />
  <text x="415" y="330" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <!-- Середина O -->
  <circle cx="250" cy="300" r="5" fill="#1E2321" />
  <text x="230" y="290" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1E2321">O</text>

  <!-- Прямой угол -->
  <line x1="240" y1="290" x2="250" y2="290" stroke="#1E2321" stroke-width="1.5" />
  <line x1="250" y1="290" x2="250" y2="300" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отметки равных отрезков -->
  <line x1="170" y1="292" x2="180" y2="302" stroke="#1E2321" stroke-width="1.5" />
  <line x1="320" y1="292" x2="330" y2="302" stroke="#1E2321" stroke-width="1.5" />

  <!-- Точка M на перпендикуляре -->
  <circle cx="250" cy="120" r="5" fill="#2563eb" />
  <text x="260" y="115" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#2563eb">M</text>

  <!-- Отрезки MA и MB -->
  <line x1="250" y1="120" x2="100" y2="300" stroke="#2563eb" stroke-width="2" />
  <line x1="250" y1="120" x2="400" y2="300" stroke="#2563eb" stroke-width="2" />

  <!-- Обозначения длин -->
  <text x="155" y="220" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">MA</text>
  <text x="320" y="220" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">MB</text>

  <!-- Подпись прямой -->
  <text x="225" y="50" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">l</text>

  <!-- Формула -->
  <text x="250" y="390" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">MA = MB   ⇔   M ∈ l</text>
</svg>