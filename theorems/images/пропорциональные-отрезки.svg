<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Прямоугольный треугольник ABC -->
  <line x1="80" y1="340" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="340" x2="80" y2="160" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="160" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Высота CD -->
  <line x1="80" y1="160" x2="190" y2="340" stroke="#c2410c" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="80" cy="340" r="5" fill="#7A9D8C" />
  <text x="55" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="340" r="5" fill="#7A9D8C" />
  <text x="415" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="80" cy="160" r="5" fill="#7A9D8C" />
  <text x="55" y="150" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Основание высоты D -->
  <circle cx="190" cy="340" r="4" fill="#c2410c" />
  <text x="195" y="370" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">D</text>

  <!-- Прямой угол при C -->
  <line x1="90" y1="330" x2="90" y2="170" stroke="#1E2321" stroke-width="1.5" />
  <line x1="80" y1="330" x2="90" y2="330" stroke="#1E2321" stroke-width="1.5" />

  <!-- Прямой угол при D -->
  <line x1="180" y1="330" x2="190" y2="330" stroke="#c2410c" stroke-width="1.5" />
  <line x1="190" y1="330" x2="190" y2="340" stroke="#c2410c" stroke-width="1.5" />

  <!-- Обозначения -->
  <text x="240" y="365" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">a</text>
  <text x="50" y="255" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  <text x="220" y="250" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>

  <!-- Проекции -->
  <text x="120" y="365" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">b_c</text>
  <text x="300" y="365" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16a34a">a_c</text>

  <!-- Высота -->
  <text x="125" y="255" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">h</text>

  <!-- Формулы -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">h² = a_c · b_c    |    a² = c · a_c    |    b² = c · b_c</text>
</svg>