<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="250" cy="210" r="140" fill="none" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Вписанный четырёхугольник ABCD -->
  <line x1="120" y1="300" x2="350" y2="320" stroke="#1E2321" stroke-width="2.5" />
  <line x1="350" y1="320" x2="380" y2="130" stroke="#1E2321" stroke-width="2.5" />
  <line x1="380" y1="130" x2="150" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="150" y1="100" x2="120" y2="300" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="120" cy="300" r="5" fill="#7A9D8C" />
  <text x="95" y="325" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="350" cy="320" r="5" fill="#7A9D8C" />
  <text x="365" y="345" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="380" cy="130" r="5" fill="#7A9D8C" />
  <text x="395" y="125" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <circle cx="150" cy="100" r="5" fill="#7A9D8C" />
  <text x="125" y="95" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">D</text>

  <!-- Дуги углов -->
  <path d="M 145 285 Q 155 275 150 265" fill="none" stroke="#c2410c" stroke-width="2" />
  <text x="140" y="265" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">A</text>

  <path d="M 325 305 Q 315 295 310 285" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="300" y="280" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">B</text>

  <path d="M 355 145 Q 345 155 340 165" fill="none" stroke="#16a34a" stroke-width="2" />
  <text x="330" y="175" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16a34a">C</text>

  <path d="M 175 115 Q 185 125 180 135" fill="none" stroke="#9333ea" stroke-width="2" />
  <text x="180" y="145" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#9333ea">D</text>

  <!-- Формула -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">∠A + ∠C = 180°    |    ∠B + ∠D = 180°</text>
</svg>