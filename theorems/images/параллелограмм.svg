<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 380" width="100%" height="100%">
  <rect width="500" height="380" fill="#f5f7fa" rx="12" />

  <!-- Параллелограмм ABCD -->
  <line x1="100" y1="280" x2="380" y2="280" stroke="#1E2321" stroke-width="2.5" />
  <line x1="100" y1="280" x2="140" y2="120" stroke="#1E2321" stroke-width="2.5" />
  <line x1="140" y1="120" x2="420" y2="120" stroke="#1E2321" stroke-width="2.5" />
  <line x1="420" y1="120" x2="380" y2="280" stroke="#1E2321" stroke-width="2.5" />

  <!-- Диагонали -->
  <line x1="100" y1="280" x2="420" y2="120" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="140" y1="120" x2="380" y2="280" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Точка пересечения O -->
  <circle cx="260" cy="200" r="4" fill="#1E2321" />
  <text x="270" y="195" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">O</text>

  <!-- Вершины -->
  <circle cx="100" cy="280" r="5" fill="#7A9D8C" />
  <text x="75" y="305" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="380" cy="280" r="5" fill="#7A9D8C" />
  <text x="395" y="305" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="420" cy="120" r="5" fill="#7A9D8C" />
  <text x="435" y="115" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <circle cx="140" cy="120" r="5" fill="#7A9D8C" />
  <text x="115" y="115" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">D</text>

  <!-- Отметки параллельности -->
  <line x1="230" y1="275" x2="240" y2="280" stroke="#1E2321" stroke-width="1.5" />
  <line x1="235" y1="270" x2="245" y2="275" stroke="#1E2321" stroke-width="1.5" />

  <line x1="270" y1="125" x2="280" y2="130" stroke="#1E2321" stroke-width="1.5" />
  <line x1="275" y1="120" x2="285" y2="125" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отметки равных сторон -->
  <line x1="230" y1="270" x2="240" y2="280" stroke="#c2410c" stroke-width="1.5" />
  <line x1="260" y1="130" x2="270" y2="140" stroke="#c2410c" stroke-width="1.5" />

  <line x1="140" y1="200" x2="150" y2="205" stroke="#2563eb" stroke-width="1.5" />
  <line x1="350" y1="200" x2="360" y2="205" stroke="#2563eb" stroke-width="1.5" />

  <!-- Обозначения -->
  <text x="220" y="300" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">a</text>
  <text x="120" y="195" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">b</text>
  <text x="330" y="195" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">b</text>
  <text x="300" y="300" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">a</text>

  <!-- Формула -->
  <text x="250" y="370" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">AB ∥ CD, BC ∥ AD    |    AB = CD, BC = AD    |    AO = OC, BO = OD</text>
</svg>