<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="330" x2="400" y2="330" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="330" x2="240" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="240" y1="80" x2="400" y2="330" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вписанная окружность -->
  <circle cx="235" cy="250" r="45" fill="none" stroke="#c2410c" stroke-width="2" />

  <!-- Биссектриса AA₁ -->
  <line x1="240" y1="80" x2="220" y2="330" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Биссектриса BB₁ -->
  <line x1="80" y1="330" x2="330" y2="180" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Биссектриса CC₁ -->
  <line x1="400" y1="330" x2="180" y2="180" stroke="#9333ea" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Вершины -->
  <circle cx="80" cy="330" r="5" fill="#7A9D8C" />
  <text x="55" y="360" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="330" r="5" fill="#7A9D8C" />
  <text x="415" y="360" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="240" cy="80" r="5" fill="#7A9D8C" />
  <text x="225" y="65" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Инцентр I -->
  <circle cx="235" cy="250" r="5" fill="#c2410c" />
  <text x="245" y="245" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#c2410c">I</text>

  <!-- Радиус r -->
  <line x1="235" y1="250" x2="235" y2="295" stroke="#c2410c" stroke-width="1.5" />
  <text x="245" y="278" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#c2410c">r</text>

  <!-- Перпендикуляры к сторонам -->
  <line x1="235" y1="250" x2="280" y2="310" stroke="#c2410c" stroke-width="1" stroke-dasharray="3,2" />
  <line x1="235" y1="250" x2="150" y2="300" stroke="#c2410c" stroke-width="1" stroke-dasharray="3,2" />

  <!-- Формула -->
  <text x="250" y="415" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">I — инцентр    |    r = S / p</text>
</svg>