<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC (равнобедренный) -->
  <line x1="80" y1="330" x2="420" y2="330" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="330" x2="250" y2="90" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="90" x2="420" y2="330" stroke="#1E2321" stroke-width="2.5" />

  <!-- Линия CD (медиана/биссектриса/высота) -->
  <line x1="250" y1="90" x2="250" y2="330" stroke="#c2410c" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="80" cy="330" r="5" fill="#7A9D8C" />
  <text x="55" y="360" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="420" cy="330" r="5" fill="#7A9D8C" />
  <text x="435" y="360" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="250" cy="90" r="5" fill="#7A9D8C" />
  <text x="235" y="75" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Точка D -->
  <circle cx="250" cy="330" r="4" fill="#c2410c" />
  <text x="260" y="360" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">D</text>

  <!-- Прямой угол -->
  <line x1="240" y1="320" x2="250" y2="320" stroke="#c2410c" stroke-width="1.5" />
  <line x1="250" y1="320" x2="250" y2="330" stroke="#c2410c" stroke-width="1.5" />

  <!-- Отметки равных сторон -->
  <line x1="155" y1="215" x2="165" y2="220" stroke="#1E2321" stroke-width="1.5" />
  <line x1="335" y1="215" x2="345" y2="220" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отметки равных отрезков основания -->
  <line x1="160" y1="322" x2="170" y2="332" stroke="#1E2321" stroke-width="1.5" />
  <line x1="330" y1="322" x2="340" y2="332" stroke="#1E2321" stroke-width="1.5" />

  <!-- Дуги равных углов при C -->
  <path d="M 225 115 Q 235 125 240 115" fill="none" stroke="#2563eb" stroke-width="2" />
  <path d="M 240 115 Q 250 122 255 115" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="232" y="108" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563eb">α</text>
  <text x="248" y="108" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563eb">α</text>

  <!-- Подписи -->
  <text x="230" y="210" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">медиана</text>
  <text x="225" y="230" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">биссектриса</text>
  <text x="230" y="250" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">высота</text>

  <!-- Формула -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">CD — медиана, биссектриса и высота одновременно</text>
</svg>