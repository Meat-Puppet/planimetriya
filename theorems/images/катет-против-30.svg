<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Прямоугольный треугольник ABC -->
  <line x1="80" y1="330" x2="380" y2="330" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="330" x2="80" y2="160" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="160" x2="380" y2="330" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="80" cy="330" r="5" fill="#7A9D8C" />
  <text x="55" y="360" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="380" cy="330" r="5" fill="#7A9D8C" />
  <text x="395" y="360" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="80" cy="160" r="5" fill="#7A9D8C" />
  <text x="55" y="150" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Прямой угол при C -->
  <line x1="90" y1="320" x2="90" y2="170" stroke="#1E2321" stroke-width="1.5" />
  <line x1="80" y1="320" x2="90" y2="320" stroke="#1E2321" stroke-width="1.5" />

  <!-- Дуга угла 30° при A -->
  <path d="M 110 315 Q 125 300 120 285" fill="none" stroke="#c2410c" stroke-width="2.5" />
  <text x="95" y="290" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">30°</text>

  <!-- Дуга угла 60° при B -->
  <path d="M 350 315 Q 340 300 335 285" fill="none" stroke="#2563eb" stroke-width="2" />
  <text x="345" y="290" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">60°</text>

  <!-- Обозначения сторон -->
  <text x="230" y="355" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">a</text>
  <text x="50" y="250" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  <text x="210" y="240" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">a = c / 2</text>
</svg>