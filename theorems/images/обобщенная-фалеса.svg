<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Угол O -->
  <line x1="60" y1="330" x2="430" y2="330" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="330" x2="220" y2="110" stroke="#1E2321" stroke-width="2.5" />

  <!-- Параллельные прямые AC и BD -->
  <line x1="160" y1="330" x2="120" y2="180" stroke="#c2410c" stroke-width="2" />
  <line x1="320" y1="330" x2="180" y2="110" stroke="#2563eb" stroke-width="2" />

  <!-- Точки -->
  <circle cx="60" cy="330" r="5" fill="#7A9D8C" />
  <text x="35" y="355" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">O</text>

  <circle cx="160" cy="330" r="4" fill="#c2410c" />
  <text x="145" y="355" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">A</text>

  <circle cx="320" cy="330" r="4" fill="#2563eb" />
  <text x="330" y="355" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#2563eb">B</text>

  <circle cx="120" cy="180" r="4" fill="#c2410c" />
  <text x="100" y="175" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">C</text>

  <circle cx="180" cy="110" r="4" fill="#2563eb" />
  <text x="190" y="105" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#2563eb">D</text>

  <!-- Отметки параллельности -->
  <line x1="145" y1="250" x2="155" y2="255" stroke="#c2410c" stroke-width="1.5" />
  <line x1="150" y1="245" x2="160" y2="250" stroke="#c2410c" stroke-width="1.5" />

  <line x1="255" y1="215" x2="265" y2="220" stroke="#2563eb" stroke-width="1.5" />
  <line x1="260" y1="210" x2="270" y2="215" stroke="#2563eb" stroke-width="1.5" />

  <!-- Обозначения отрезков -->
  <text x="105" y="345" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#c2410c">OA</text>
  <text x="240" y="345" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#2563eb">AB</text>
  <text x="80" y="260" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#c2410c">OC</text>
  <text x="140" y="140" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#2563eb">CD</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">OA/OB = OC/OD = AC/BD</text>
</svg>