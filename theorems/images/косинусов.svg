<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="320" x2="400" y2="320" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="320" x2="280" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="280" y1="100" x2="400" y2="320" stroke="#1E2321" stroke-width="2.5" />

  <!-- Высота BD -->
  <line x1="280" y1="100" x2="280" y2="320" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Вершины -->
  <circle cx="80" cy="320" r="5" fill="#7A9D8C" />
  <text x="55" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <circle cx="280" cy="100" r="5" fill="#7A9D8C" />
  <text x="265" y="85" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="400" cy="320" r="5" fill="#7A9D8C" />
  <text x="415" y="350" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <!-- Точка D -->
  <circle cx="280" cy="320" r="4" fill="#c2410c" />
  <text x="290" y="345" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">D</text>

  <!-- Прямой угол у D -->
  <line x1="270" y1="310" x2="280" y2="310" stroke="#c2410c" stroke-width="1.5" />
  <line x1="280" y1="310" x2="280" y2="320" stroke="#c2410c" stroke-width="1.5" />

  <!-- Обозначения сторон -->
  <text x="230" y="340" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">a</text>
  <text x="340" y="340" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">b</text>
  <text x="160" y="200" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">c</text>

  <!-- Отрезки x и b-x -->
  <text x="160" y="310" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#1E2321">x</text>
  <text x="330" y="310" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#1E2321">b − x</text>

  <!-- Высота h -->
  <text x="260" y="210" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="500" fill="#c2410c">h</text>

  <!-- Дуга угла A -->
  <path d="M 110 305 Q 125 290 120 275" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="95" y="280" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>

  <!-- Дуга угла B -->
  <path d="M 250 130 Q 265 140 270 130" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="255" y="120" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>

  <!-- Дуга угла C -->
  <path d="M 370 305 Q 360 290 355 275" fill="none" stroke="#1E2321" stroke-width="2" />
  <text x="375" y="280" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>
</svg>