<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Описанный четырёхугольник ABCD -->
  <line x1="120" y1="320" x2="360" y2="320" stroke="#1E2321" stroke-width="2.5" />
  <line x1="360" y1="320" x2="400" y2="140" stroke="#1E2321" stroke-width="2.5" />
  <line x1="400" y1="140" x2="140" y2="120" stroke="#1E2321" stroke-width="2.5" />
  <line x1="140" y1="120" x2="120" y2="320" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вписанная окружность -->
  <circle cx="250" cy="230" r="60" fill="none" stroke="#c2410c" stroke-width="2" />

  <!-- Центр вписанной окружности I -->
  <circle cx="250" cy="230" r="5" fill="#c2410c" />
  <text x="260" y="225" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#c2410c">I</text>

  <!-- Диагонали -->
  <line x1="120" y1="320" x2="400" y2="140" stroke="#2563eb" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="140" y1="120" x2="360" y2="320" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Середины диагоналей -->
  <circle cx="260" cy="230" r="5" fill="#2563eb" />
  <text x="270" y="240" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">M</text>

  <circle cx="250" cy="220" r="5" fill="#16a34a" />
  <text x="235" y="215" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16a34a">N</text>

  <!-- Вершины -->
  <circle cx="120" cy="320" r="5" fill="#7A9D8C" />
  <text x="95" y="345" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="360" cy="320" r="5" fill="#7A9D8C" />
  <text x="375" y="345" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="400" cy="140" r="5" fill="#7A9D8C" />
  <text x="415" y="135" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <circle cx="140" cy="120" r="5" fill="#7A9D8C" />
  <text x="115" y="115" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">D</text>

  <!-- Прямая Ньютона -->
  <line x1="180" y1="200" x2="320" y2="250" stroke="#9333ea" stroke-width="2.5" />
  <text x="220" y="195" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333ea">прямая Ньютона</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">M, N — середины диагоналей    |    I — центр вписанной окружности    |    I ∈ MN</text>
</svg>