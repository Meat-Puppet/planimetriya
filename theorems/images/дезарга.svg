<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="120" y1="320" x2="380" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="120" y1="320" x2="250" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="80" x2="380" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Треугольник A'B'C' -->
  <line x1="80" y1="260" x2="420" y2="280" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="80" y1="260" x2="280" y2="50" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="280" y1="50" x2="420" y2="280" stroke="#c2410c" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Вершины ABC -->
  <circle cx="120" cy="320" r="5" fill="#7A9D8C" />
  <text x="100" y="345" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>
  <circle cx="380" cy="340" r="5" fill="#7A9D8C" />
  <text x="395" y="365" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>
  <circle cx="250" cy="80" r="5" fill="#7A9D8C" />
  <text x="235" y="65" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <!-- Вершины A'B'C' -->
  <circle cx="80" cy="260" r="4" fill="#c2410c" />
  <text x="55" y="255" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">A'</text>
  <circle cx="420" cy="280" r="4" fill="#c2410c" />
  <text x="435" y="275" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">B'</text>
  <circle cx="280" cy="50" r="4" fill="#c2410c" />
  <text x="290" y="45" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#c2410c">C'</text>

  <!-- Центр перспективы O -->
  <circle cx="250" cy="200" r="5" fill="#2563eb" />
  <text x="260" y="195" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#2563eb">O</text>

  <!-- Прямые AA', BB', CC' -->
  <line x1="120" y1="320" x2="80" y2="260" stroke="#2563eb" stroke-width="1" opacity="0.5" />
  <line x1="380" y1="340" x2="420" y2="280" stroke="#2563eb" stroke-width="1" opacity="0.5" />
  <line x1="250" y1="80" x2="280" y2="50" stroke="#2563eb" stroke-width="1" opacity="0.5" />

  <!-- Точки пересечения сторон P, Q, R -->
  <circle cx="100" cy="290" r="4" fill="#16a34a" />
  <text x="75" y="285" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">P</text>

  <circle cx="400" cy="310" r="4" fill="#16a34a" />
  <text x="415" y="305" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">Q</text>

  <circle cx="265" cy="65" r="4" fill="#16a34a" />
  <text x="275" y="60" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">R</text>

  <!-- Ось перспективы (прямая PQR) -->
  <line x1="80" y1="270" x2="420" y2="340" stroke="#16a34a" stroke-width="2" stroke-dasharray="4,2" />
  <text x="350" y="360" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">ось перспективы</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">AA' ∩ BB' ∩ CC' = O  ⇒  P, Q, R коллинеарны</text>
</svg>