<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 460" width="100%" height="100%">
  <rect width="500" height="460" fill="#f5f7fa" rx="12" />

  <!-- Описанная окружность -->
  <circle cx="250" cy="220" r="130" fill="none" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="6,3" />

  <!-- Треугольник ABC -->
  <line x1="120" y1="310" x2="380" y2="310" stroke="#1E2321" stroke-width="2.5" />
  <line x1="120" y1="310" x2="260" y2="100" stroke="#1E2321" stroke-width="2.5" />
  <line x1="260" y1="100" x2="380" y2="310" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="120" cy="310" r="5" fill="#7A9D8C" />
  <text x="95" y="340" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="380" cy="310" r="5" fill="#7A9D8C" />
  <text x="395" y="340" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="260" cy="100" r="5" fill="#7A9D8C" />
  <text x="245" y="85" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Точка P на окружности -->
  <circle cx="200" cy="100" r="5" fill="#c2410c" />
  <text x="180" y="90" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#c2410c">P</text>

  <!-- Перпендикуляры и основания -->
  <line x1="200" y1="100" x2="250" y2="310" stroke="#2563eb" stroke-width="1.5" stroke-dasharray="4,2" />
  <circle cx="250" cy="310" r="4" fill="#2563eb" />
  <text x="260" y="335" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">A₁</text>

  <line x1="200" y1="100" x2="190" y2="210" stroke="#16a34a" stroke-width="1.5" stroke-dasharray="4,2" />
  <circle cx="190" cy="210" r="4" fill="#16a34a" />
  <text x="165" y="205" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#16a34a">B₁</text>

  <line x1="200" y1="100" x2="290" y2="230" stroke="#9333ea" stroke-width="1.5" stroke-dasharray="4,2" />
  <circle cx="290" cy="230" r="4" fill="#9333ea" />
  <text x="300" y="225" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#9333ea">C₁</text>

  <!-- Прямые углы -->
  <line x1="240" y1="300" x2="248" y2="300" stroke="#2563eb" stroke-width="1" />
  <line x1="248" y1="300" x2="248" y2="308" stroke="#2563eb" stroke-width="1" />

  <line x1="195" y1="115" x2="203" y2="115" stroke="#16a34a" stroke-width="1" />
  <line x1="203" y1="115" x2="203" y2="123" stroke="#16a34a" stroke-width="1" />

  <line x1="205" y1="115" x2="213" y2="115" stroke="#9333ea" stroke-width="1" />
  <line x1="213" y1="115" x2="213" y2="123" stroke="#9333ea" stroke-width="1" />

  <!-- Прямая Симсона -->
  <line x1="170" y1="160" x2="310" y2="290" stroke="#c2410c" stroke-width="2.5" />
  <text x="280" y="270" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">прямая Симсона</text>

  <!-- Формула -->
  <text x="250" y="450" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">A₁, B₁, C₁ — основания перпендикуляров из P    |    A₁, B₁, C₁ коллинеарны</text>
</svg>