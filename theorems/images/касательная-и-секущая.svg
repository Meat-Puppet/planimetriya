<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Окружность -->
  <circle cx="280" cy="210" r="100" fill="none" stroke="#1E2321" stroke-width="2" />

  <!-- Центр O -->
  <circle cx="280" cy="210" r="4" fill="#1E2321" />
  <text x="290" y="205" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">O</text>

  <!-- Точка A вне окружности -->
  <circle cx="60" cy="210" r="5" fill="#7A9D8C" />
  <text x="35" y="215" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <!-- Касательная AB -->
  <line x1="60" y1="210" x2="195" y2="250" stroke="#c2410c" stroke-width="2.5" />

  <!-- Точка касания B -->
  <circle cx="195" cy="250" r="5" fill="#7A9D8C" />
  <text x="175" y="275" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <!-- Секущая ACD -->
  <line x1="60" y1="210" x2="370" y2="290" stroke="#2563eb" stroke-width="2.5" />

  <!-- Точки C и D -->
  <circle cx="240" cy="265" r="5" fill="#7A9D8C" />
  <text x="225" y="290" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <circle cx="350" cy="285" r="5" fill="#7A9D8C" />
  <text x="365" y="290" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">D</text>

  <!-- Отрезки BC и BD (пунктиром) -->
  <line x1="195" y1="250" x2="240" y2="265" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="4,2" />
  <line x1="195" y1="250" x2="350" y2="285" stroke="#1E2321" stroke-width="1.5" stroke-dasharray="4,2" />

  <!-- Обозначения -->
  <text x="110" y="225" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">AB</text>
  <text x="130" y="245" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">AC</text>
  <text x="310" y="285" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">AD</text>

  <!-- Углы -->
  <path d="M 80 215 Q 90 220 85 225" fill="none" stroke="#1E2321" stroke-width="1.5" />
  <text x="85" y="220" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">A</text>

  <!-- Формула -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321" text-anchor="middle">AB² = AC · AD</text>
</svg>