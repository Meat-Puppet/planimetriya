<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Первый треугольник ABC -->
  <line x1="60" y1="310" x2="180" y2="310" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="310" x2="60" y2="160" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="160" x2="180" y2="310" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины первого -->
  <circle cx="60" cy="310" r="4" fill="#7A9D8C" />
  <text x="35" y="335" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">A</text>
  <circle cx="180" cy="310" r="4" fill="#7A9D8C" />
  <text x="190" y="335" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">B</text>
  <circle cx="60" cy="160" r="4" fill="#7A9D8C" />
  <text x="35" y="155" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#1E2321">C</text>

  <!-- Отметки пропорциональных сторон -->
  <line x1="110" y1="305" x2="120" y2="315" stroke="#c2410c" stroke-width="1.5" />
  <line x1="55" y1="235" x2="65" y2="230" stroke="#2563eb" stroke-width="1.5" />

  <!-- Угол A -->
  <path d="M 85 295 Q 95 285 90 270" fill="none" stroke="#16a34a" stroke-width="2" />
  <text x="90" y="272" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">A</text>

  <!-- Второй треугольник A₁B₁C₁ (меньшего размера) -->
  <line x1="310" y1="290" x2="380" y2="290" stroke="#1E2321" stroke-width="2" />
  <line x1="310" y1="290" x2="310" y2="200" stroke="#1E2321" stroke-width="2" />
  <line x1="310" y1="200" x2="380" y2="290" stroke="#1E2321" stroke-width="2" />

  <!-- Вершины второго -->
  <circle cx="310" cy="290" r="3" fill="#7A9D8C" />
  <text x="285" y="310" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">A₁</text>
  <circle cx="380" cy="290" r="3" fill="#7A9D8C" />
  <text x="388" y="310" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">B₁</text>
  <circle cx="310" cy="200" r="3" fill="#7A9D8C" />
  <text x="285" y="198" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">C₁</text>

  <!-- Отметки пропорциональных сторон -->
  <line x1="338" y1="285" x2="345" y2="292" stroke="#c2410c" stroke-width="1.5" />
  <line x1="305" y1="245" x2="312" y2="242" stroke="#2563eb" stroke-width="1.5" />

  <!-- Угол A₁ -->
  <path d="M 322 278 Q 328 272 325 265" fill="none" stroke="#16a34a" stroke-width="2" />
  <text x="326" y="268" font-family="'Segoe UI', sans-serif" font-size="13" font-weight="600" fill="#16a34a">A₁</text>

  <!-- Знак подобия -->
  <text x="245" y="250" font-family="'Segoe UI', sans-serif" font-size="28" font-weight="700" fill="#1E2321" text-anchor="middle">∾</text>

  <!-- Формула -->
  <text x="250" y="390" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321" text-anchor="middle">AB/A₁B₁ = AC/A₁C₁    |    ∠A = ∠A₁    ⇒    ∆ABC ∾ ∆A₁B₁C₁</text>
</svg>