<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 400" width="100%" height="100%">
  <rect width="500" height="400" fill="#f5f7fa" rx="12" />

  <!-- Четырёхугольник ABCD -->
  <line x1="100" y1="280" x2="350" y2="280" stroke="#1E2321" stroke-width="2.5" />
  <line x1="350" y1="280" x2="400" y2="130" stroke="#1E2321" stroke-width="2.5" />
  <line x1="400" y1="130" x2="150" y2="110" stroke="#1E2321" stroke-width="2.5" />
  <line x1="150" y1="110" x2="100" y2="280" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вписанная окружность -->
  <circle cx="250" cy="200" r="55" fill="none" stroke="#c2410c" stroke-width="2" />

  <!-- Точки касания -->
  <circle cx="225" cy="265" r="4" fill="#c2410c" />
  <text x="215" y="285" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">K</text>

  <circle cx="335" cy="230" r="4" fill="#c2410c" />
  <text x="345" y="225" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">L</text>

  <circle cx="310" cy="150" r="4" fill="#c2410c" />
  <text x="320" y="145" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">M</text>

  <circle cx="170" cy="160" r="4" fill="#c2410c" />
  <text x="150" y="155" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">N</text>

  <!-- Вершины -->
  <circle cx="100" cy="280" r="5" fill="#7A9D8C" />
  <text x="75" y="305" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="350" cy="280" r="5" fill="#7A9D8C" />
  <text x="365" y="305" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="400" cy="130" r="5" fill="#7A9D8C" />
  <text x="415" y="125" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <circle cx="150" cy="110" r="5" fill="#7A9D8C" />
  <text x="125" y="105" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">D</text>

  <!-- Центр окружности -->
  <circle cx="250" cy="200" r="3" fill="#c2410c" />
  <text x="260" y="195" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">O</text>

  <!-- Обозначения сторон -->
  <text x="210" y="295" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">AB</text>
  <text x="380" y="210" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">BC</text>
  <text x="260" y="110" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">CD</text>
  <text x="105" y="195" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321">AD</text>

  <!-- Формула -->
  <text x="250" y="395" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#1E2321" text-anchor="middle">AB + CD = BC + AD</text>
</svg>