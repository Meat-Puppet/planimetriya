<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 420" width="100%" height="100%">
  <rect width="500" height="420" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="60" y1="340" x2="420" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="60" y1="340" x2="240" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="240" y1="80" x2="420" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Медиана AA₁ -->
  <line x1="240" y1="80" x2="240" y2="340" stroke="#c2410c" stroke-width="2.5" />

  <!-- Медиана BB₁ -->
  <line x1="60" y1="340" x2="330" y2="210" stroke="#2563eb" stroke-width="2.5" />

  <!-- Медиана CC₁ -->
  <line x1="420" y1="340" x2="150" y2="210" stroke="#16a34a" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="60" cy="340" r="5" fill="#7A9D8C" />
  <text x="35" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">B</text>

  <circle cx="420" cy="340" r="5" fill="#7A9D8C" />
  <text x="435" y="370" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">C</text>

  <circle cx="240" cy="80" r="5" fill="#7A9D8C" />
  <text x="225" y="65" font-family="'Segoe UI', sans-serif" font-size="22" font-weight="600" fill="#1E2321">A</text>

  <!-- Середины сторон -->
  <circle cx="240" cy="340" r="4" fill="#c2410c" />
  <text x="245" y="370" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#c2410c">A₁</text>

  <circle cx="330" cy="210" r="4" fill="#2563eb" />
  <text x="340" y="205" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#2563eb">B₁</text>

  <circle cx="150" cy="210" r="4" fill="#16a34a" />
  <text x="120" y="205" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="600" fill="#16a34a">C₁</text>

  <!-- Точка пересечения O -->
  <circle cx="240" cy="253" r="5" fill="#1E2321" />
  <text x="250" y="248" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="700" fill="#1E2321">O</text>

  <!-- Отметки равных отрезков на сторонах -->
  <line x1="145" y1="335" x2="155" y2="345" stroke="#1E2321" stroke-width="1.5" />
  <line x1="325" y1="335" x2="335" y2="345" stroke="#1E2321" stroke-width="1.5" />

  <line x1="295" y1="150" x2="305" y2="145" stroke="#1E2321" stroke-width="1.5" />
  <line x1="345" y1="260" x2="350" y2="250" stroke="#1E2321" stroke-width="1.5" />

  <line x1="185" y1="150" x2="195" y2="145" stroke="#1E2321" stroke-width="1.5" />
  <line x1="115" y1="260" x2="120" y2="250" stroke="#1E2321" stroke-width="1.5" />

  <!-- Отношение 2:1 -->
  <text x="230" y="170" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">2</text>
  <text x="230" y="300" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#c2410c">1</text>

  <!-- Формула -->
  <text x="250" y="410" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">AO : OA₁ = 2 : 1    |    mₐ = ½√(2b² + 2c² − a²)</text>
</svg>