<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 460" width="100%" height="100%">
  <rect width="500" height="460" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="340" x2="400" y2="340" stroke="#1E2321" stroke-width="2" />
  <line x1="80" y1="340" x2="260" y2="80" stroke="#1E2321" stroke-width="2" />
  <line x1="260" y1="80" x2="400" y2="340" stroke="#1E2321" stroke-width="2" />

  <!-- Вершины -->
  <circle cx="80" cy="340" r="5" fill="#7A9D8C" />
  <text x="55" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="340" r="5" fill="#7A9D8C" />
  <text x="415" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="260" cy="80" r="5" fill="#7A9D8C" />
  <text x="245" y="65" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Окружность девяти точек -->
  <circle cx="245" cy="235" r="85" fill="none" stroke="#c2410c" stroke-width="2.5" />

  <!-- Центр N -->
  <circle cx="245" cy="235" r="4" fill="#c2410c" />
  <text x="255" y="230" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="700" fill="#c2410c">N</text>

  <!-- Середины сторон -->
  <circle cx="240" cy="340" r="4" fill="#2563eb" />
  <text x="250" y="365" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563eb">A₁</text>

  <circle cx="330" cy="210" r="4" fill="#2563eb" />
  <text x="340" y="205" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563eb">B₁</text>

  <circle cx="170" cy="210" r="4" fill="#2563eb" />
  <text x="140" y="205" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#2563eb">C₁</text>

  <!-- Основания высот -->
  <circle cx="260" cy="340" r="4" fill="#16a34a" />
  <text x="270" y="365" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">A₂</text>

  <circle cx="320" cy="230" r="4" fill="#16a34a" />
  <text x="330" y="225" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">B₂</text>

  <circle cx="185" cy="225" r="4" fill="#16a34a" />
  <text x="155" y="220" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#16a34a">C₂</text>

  <!-- Середины AH, BH, CH -->
  <circle cx="230" cy="280" r="4" fill="#9333ea" />
  <text x="215" y="300" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333ea">A₃</text>

  <circle cx="270" cy="260" r="4" fill="#9333ea" />
  <text x="280" y="255" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333ea">B₃</text>

  <circle cx="205" cy="250" r="4" fill="#9333ea" />
  <text x="175" y="245" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#9333ea">C₃</text>

  <!-- Ортоцентр H -->
  <circle cx="250" cy="290" r="3" fill="#1E2321" />
  <text x="260" cy="288" font-family="'Segoe UI', sans-serif" font-size="14" font-weight="600" fill="#1E2321">H</text>

  <!-- Высоты -->
  <line x1="260" y1="80" x2="260" y2="340" stroke="#1E2321" stroke-width="1" stroke-dasharray="4,2" opacity="0.4" />
  <line x1="80" y1="340" x2="330" y2="220" stroke="#1E2321" stroke-width="1" stroke-dasharray="4,2" opacity="0.4" />
  <line x1="400" y1="340" x2="180" y2="220" stroke="#1E2321" stroke-width="1" stroke-dasharray="4,2" opacity="0.4" />

  <!-- Формула -->
  <text x="250" y="450" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">R₉ = R / 2    |    N — середина OH</text>
</svg>