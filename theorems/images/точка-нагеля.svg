<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 440" width="100%" height="100%">
  <rect width="500" height="440" fill="#f5f7fa" rx="12" />

  <!-- Треугольник ABC -->
  <line x1="80" y1="340" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />
  <line x1="80" y1="340" x2="250" y2="80" stroke="#1E2321" stroke-width="2.5" />
  <line x1="250" y1="80" x2="400" y2="340" stroke="#1E2321" stroke-width="2.5" />

  <!-- Вершины -->
  <circle cx="80" cy="340" r="5" fill="#7A9D8C" />
  <text x="55" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">A</text>

  <circle cx="400" cy="340" r="5" fill="#7A9D8C" />
  <text x="415" y="370" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">B</text>

  <circle cx="250" cy="80" r="5" fill="#7A9D8C" />
  <text x="235" y="65" font-family="'Segoe UI', sans-serif" font-size="20" font-weight="600" fill="#1E2321">C</text>

  <!-- Точки касания вневписанных окружностей -->
  <circle cx="280" cy="340" r="4" fill="#2563eb" />
  <text x="290" y="370" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">A₁</text>

  <circle cx="340" cy="290" r="4" fill="#2563eb" />
  <text x="350" y="285" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">B₁</text>

  <circle cx="180" cy="220" r="4" fill="#2563eb" />
  <text x="150" y="215" font-family="'Segoe UI', sans-serif" font-size="16" font-weight="600" fill="#2563eb">C₁</text>

  <!-- Чевианы -->
  <line x1="80" y1="340" x2="280" y2="340" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="400" y1="340" x2="340" y2="290" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />
  <line x1="250" y1="80" x2="180" y2="220" stroke="#16a34a" stroke-width="2" stroke-dasharray="6,3" />

  <!-- Точка Нагеля Na -->
  <circle cx="235" cy="280" r="5" fill="#1E2321" />
  <text x="245" y="275" font-family="'Segoe UI', sans-serif" font-size="18" font-weight="700" fill="#1E2321">Na</text>

  <!-- Формула -->
  <text x="250" y="430" font-family="'Segoe UI', sans-serif" font-size="15" font-weight="600" fill="#1E2321" text-anchor="middle">AA₁ ∩ BB₁ ∩ CC₁ = Na</text>
</svg>